<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On & Photo Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1a1a1a; color: #e0e0e0; min-height: 100vh; padding-bottom: 90px; }
        
        header { background: #2d2d2d; padding: 12px; border-bottom: 2px solid #444; }
        header h1 { font-size: 18px; margin-bottom: 8px; background: linear-gradient(135deg, #ff6b6b, #ffa500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .api-settings { display: flex; gap: 8px; flex-direction: column; }
        .api-settings input { background: #333; border: 1px solid #555; color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%; }
        .api-settings button { background: #4CAF50; border: none; color: #fff; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .main-container { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        
        .drop-zones { display: flex; gap: 10px; }
        .drop-zone { flex: 1; border: 2px dashed #555; border-radius: 10px; padding: 10px; text-align: center; background: #252525; }
        .drop-zone p { font-size: 13px; color: #aaa; }
        .drop-zone img { max-width: 100%; height: 80px; object-fit: contain; border-radius: 6px; margin-top: 5px; }
        
        /* Canvas Responsive Fixed Container */
        .canvas-wrapper { background: #121212; border-radius: 10px; border: 1px solid #333; height: 260px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #editorCanvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .editor-tools { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: space-around; background: #252525; padding: 10px; border-radius: 8px; }
        .editor-tools label { font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .editor-tools input[type="range"] { width: 60px; accent-color: #ff6b6b; }
        .editor-tools button { background: #444; border: none; color: #fff; padding: 6px 10px; border-radius: 5px; font-size: 11px; }
        
        #status { color: #ffa500; font-size: 12px; text-align: center; background: #222; padding: 8px; border-radius: 6px; border: 1px solid #444; }
        
        .output-box { background: #121212; border-radius: 10px; border: 1px solid #333; height: 260px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #outputImage { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .output-actions { display: flex; gap: 10px; margin-top: 8px; }
        .output-actions button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: 600; color: #fff; font-size: 12px; }
        #downloadBtn { background: #2196F3; }
        #clearBtn { background: #f44336; }

        /* ALWAYS VISIBLE BOTTOM STICKY BAR */
        .sticky-action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1f1f1f; padding: 10px 15px; border-top: 2px solid #333; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); z-index: 9999; }
        .btn-primary-action { background: #ff6b6b; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(255,107,107,0.4); }
        .btn-primary-action:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <header>
        <h1>🎨 AI Photo Studio & Try-On</h1>
        <div class="api-settings">
            <input type="text" id="replicateKey" placeholder="Replicate API Token (पूरी Key डालें)">
            <input type="text" id="imgbbKey" placeholder="ImgBB API Key">
            <button onclick="saveKeys()">Save Keys</button>
        </div>
    </header>

    <div class="main-container">
        <div class="drop-zones">
            <div class="drop-zone" onclick="document.getElementById('modelInput').click()">
                <p>📸 मॉडल</p>
                <img id="modelPreview" style="display:none;">
                <input type="file" id="modelInput" accept="image/*" style="display:none">
            </div>
            <div class="drop-zone" onclick="document.getElementById('garmentInput').click()">
                <p>👕 कपड़ा</p>
                <img id="garmentPreview" style="display:none;">
                <input type="file" id="garmentInput" accept="image/*" style="display:none">
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="editorCanvas"></canvas>
        </div>

        <div class="editor-tools">
            <label>चमक <input type="range" id="brightness" min="-100" max="100" value="0" oninput="applyFilters()"></label>
            <label>कंट्रास्ट <input type="range" id="contrast" min="-100" max="100" value="0" oninput="applyFilters()"></label>
            <label>सैचुरेशन <input type="range" id="saturation" min="-100" max="100" value="0" oninput="applyFilters()"></label>
            <button onclick="rotateImage(90)">↻ रोटेट</button>
            <button onclick="flipImage('h')">⇆ फ्लिप</button>
            <button onclick="resetFilters()">↺ रीसेट</button>
        </div>

        <div id="status">✔️ फोटो चुनें फिर नीचे दिया लाल बटन दबाएँ</div>

        <div class="output-box">
            <img id="outputImage" src="" alt="AI रिजल्ट यहाँ दिखेगा">
        </div>

        <div class="output-actions">
            <button id="downloadBtn" onclick="downloadResult()">📥 डाउनलोड</button>
            <button id="clearBtn" onclick="clearAll()">🗑️ रीसेट</button>
        </div>
    </div>

    <!-- ALWAYS VISIBLE FLOATING BUTTON AT BOTTOM -->
    <div class="sticky-action-bar">
        <button class="btn-primary-action" onclick="runAITryOn()">🤖 AI ट्राई-ऑन शुरू करें</button>
    </div>

    <script>
        let modelFile = null, garmentFile = null;
        let canvas = document.getElementById('editorCanvas'), ctx = canvas.getContext('2d');
        let originalImageData = null, currentImage = new Image();

        let REPLICATE_TOKEN = localStorage.getItem('replicate_token') || '';
        let IMGBB_KEY = localStorage.getItem('imgbb_key') || '';
        document.getElementById('replicateKey').value = REPLICATE_TOKEN;
        document.getElementById('imgbbKey').value = IMGBB_KEY;

        document.getElementById('modelInput').addEventListener('change', e => handleFile(e.target.files[0], 'model'));
        document.getElementById('garmentInput').addEventListener('change', e => handleFile(e.target.files[0], 'garment'));

        function handleFile(file, type) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    if (type === 'model') {
                        modelFile = file;
                        document.getElementById('modelPreview').src = e.target.result;
                        document.getElementById('modelPreview').style.display = 'block';
                        canvas.width = img.width; canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        currentImage = img;
                    } else {
                        garmentFile = file;
                        document.getElementById('garmentPreview').src = e.target.result;
                        document.getElementById('garmentPreview').style.display = 'block';
                    }
                    document.getElementById('status').innerHTML = '✅ फोटो अपलोड हो गई!';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function applyFilters() {
            if (!originalImageData) return;
            let b = parseInt(document.getElementById('brightness').value);
            let c = parseInt(document.getElementById('contrast').value);
            let s = parseInt(document.getElementById('saturation').value);
            let imgData = new ImageData(new Uint8ClampedArray(originalImageData.data), originalImageData.width, originalImageData.height);
            let d = imgData.data;
            let factor = (259 * (c + 255)) / (255 * (259 - c));
            let satFactor = 1 + (s / 100);

            for (let i = 0; i < d.length; i += 4) {
                d[i] = Math.min(255, Math.max(0, d[i] + b));
                d[i+1] = Math.min(255, Math.max(0, d[i+1] + b));
                d[i+2] = Math.min(255, Math.max(0, d[i+2] + b));
                d[i] = Math.min(255, Math.max(0, factor * (d[i] - 128) + 128));
                d[i+1] = Math.min(255, Math.max(0, factor * (d[i+1] - 128) + 128));
                d[i+2] = Math.min(255, Math.max(0, factor * (d[i+2] - 128) + 128));
                let gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
                d[i] = Math.min(255, Math.max(0, gray + (d[i] - gray) * satFactor));
                d[i+1] = Math.min(255, Math.max(0, gray + (d[i+1] - gray) * satFactor));
                d[i+2] = Math.min(255, Math.max(0, gray + (d[i+2] - gray) * satFactor));
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function resetFilters() {
            document.getElementById('brightness').value = 0;
            document.getElementById('contrast').value = 0;
            document.getElementById('saturation').value = 0;
            if (originalImageData) ctx.putImageData(originalImageData, 0, 0);
        }

        function rotateImage(deg) {
            if (!currentImage.src) return;
            let tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.height; tempCanvas.height = canvas.width;
            tempCtx.translate(tempCanvas.width/2, tempCanvas.height/2);
            tempCtx.rotate(deg * Math.PI / 180);
            tempCtx.drawImage(canvas, -canvas.width/2, -canvas.height/2);
            canvas.width = tempCanvas.width; canvas.height = tempCanvas.height;
            ctx.drawImage(tempCanvas, 0, 0);
            originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function flipImage(dir) {
            let tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            if (dir === 'h') { tempCtx.translate(canvas.width, 0); tempCtx.scale(-1, 1); }
            tempCtx.drawImage(canvas, 0, 0);
            ctx.drawImage(tempCanvas, 0, 0);
            originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        async function runAITryOn() {
            if (!modelFile || !garmentFile) {
                alert('कृपया मॉडल और कपड़ा दोनों अपलोड करें!');
                return;
            }
            if (!REPLICATE_TOKEN || !IMGBB_KEY) {
                alert('कृपया अपनी Replicate और ImgBB Keys सेव करें!');
                return;
            }

            const status = document.getElementById('status');
            status.innerHTML = '⏳ 1/3: ImgBB पर इमेजेस अपलोड हो रही हैं...';

            try {
                const modelUrl = await uploadToImgBB(modelFile);
                const garmentUrl = await uploadToImgBB(garmentFile);

                status.innerHTML = '⏳ 2/3: AI मॉडल को प्रोसेस के लिए भेजा गया...';

                const proxy = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.replicate.com/v1/predictions';

                const response = await fetch(proxy + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${REPLICATE_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: "c87e6b95d17384768862804006c35c345f061e3895e54d320478065440d995cb",
                        input: {
                            human_img: modelUrl,
                            garm_img: garmentUrl,
                            garment_des: "clothing"
                        }
                    })
                });

                const json = await response.json();
                if (json.error) throw new Error(json.detail || json.error);
                if (!json.id) throw new Error("Replicate Token अमान्य/कटा हुआ है!");

                const predId = json.id;
                status.innerHTML = '⏳ 3/3: AI कपड़े पहना रहा है... 15-20 सेकंड प्रतीक्षा करें';

                for (let i = 0; i < 30; i++) {
                    await new Promise(r => setTimeout(r, 3000));
                    const pollUrl = `https://api.replicate.com/v1/predictions/${predId}`;
                    const res = await fetch(proxy + encodeURIComponent(pollUrl), {
                        headers: { 'Authorization': `Bearer ${REPLICATE_TOKEN}` }
                    });
                    const resJson = await res.json();

                    if (resJson.status === 'succeeded') {
                        const finalImg = Array.isArray(resJson.output) ? resJson.output[0] : resJson.output;
                        document.getElementById('outputImage').src = finalImg;
                        status.innerHTML = '✅ ट्राई-ऑन सफल! फोटो नीचे तैयार है।';
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                        return;
                    } else if (resJson.status === 'failed') {
                        throw new Error('AI जनरेशन फेल: ' + (resJson.error || 'अज्ञात एरर'));
                    }
                }
                throw new Error('समय समाप्त हो गया, दोबारा कोशिश करें।');

            } catch (err) {
                status.innerHTML = '❌ एरर: ' + err.message;
            }
        }

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
            const json = await res.json();
            if (!json.success) throw new Error('ImgBB Key सही नहीं है!');
            return json.data.url;
        }

        function saveKeys() {
            REPLICATE_TOKEN = document.getElementById('replicateKey').value.trim();
            IMGBB_KEY = document.getElementById('imgbbKey').value.trim();
            localStorage.setItem('replicate_token', REPLICATE_TOKEN);
            localStorage.setItem('imgbb_key', IMGBB_KEY);
            document.getElementById('status').innerHTML = '🔑 API Keys सेव हो गईं!';
        }

        function downloadResult() {
            const img = document.getElementById('outputImage');
            if (!img.src) return alert('पहले AI जनरेट करें!');
            const a = document.createElement('a'); a.href = img.src; a.download = 'result.png'; a.click();
        }

        function clearAll() {
            location.reload();
        }
    </script>
</body>
</html>
