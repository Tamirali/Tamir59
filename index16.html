<!DOCTYPE html> 
<html lang="hi"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Indian News Anchor Voice Controller</title> 
    <style> 
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        } 
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #111a24; 
            color: #ecf0f1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            user-select: none; 
        } 
        h2 { 
            color: #f1c40f; 
            text-align: center; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 2px; 
        } 
        p.subtitle { 
            font-size: 0.85rem; 
            color: #bdc3c7; 
            margin-bottom: 15px; 
            text-align: center; 
        } 
 
        /* 📺 स्टूडियो स्टेज (4:3 भारतीय ब्रॉडकास्ट स्क्रीन) */ 
        .stage { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            aspect-ratio: 4 / 3; 
            background: radial-gradient(circle, #1a5276 0%, #1f2a38 80%, #0e1720 100%); 
            border: 5px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        } 
 
        /* डिजिटल बैकग्राउंड स्क्रीन */ 
        .studio-screen { 
            position: absolute; 
            top: 15px; 
            left: 5%; 
            width: 90%; 
            height: 55%; 
            background: linear-gradient(135deg, rgba(41, 128, 185, 0.2), rgba(44, 62, 80, 0.4)); 
            border: 2px solid rgba(52, 152, 219, 0.3); 
            border-radius: 6px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        } 
        .studio-screen::after { 
            content: "तामीर अली NEWS LIVE"; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: rgba(255, 255, 255, 0.12); 
            letter-spacing: 2px; 
        } 
 
        /* 🧑‍💼 भारतीय न्यूज़ एंकर फ्रेम (Perfect Half Photo Look) */ 
        .anchor-container { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 10px; 
            left: 0; 
            display: flex; 
            justify-content: center; 
            z-index: 3; 
        } 
 
        /* बाल (Back Layer) */ 
        .hair-back { 
            position: absolute; 
            top: 60px; 
            width: 140px; 
            height: 160px; 
            background-color: #111; 
            border-radius: 50px 50px 30px 30px; 
            z-index: 1; 
        } 
 
        /* भारतीय पोशाक - साड़ी / सूट हाफ बॉडी */ 
        .anchor-body { 
            position: absolute; 
            bottom: 45px; 
            width: 210px; 
            height: 140px; 
            background: linear-gradient(to bottom, #d35400 0%, #b03a2e 100%); /* पारंपरिक भारतीय लाल/नारंगी बॉर्डर */ 
            border-radius: 60px 60px 0 0; 
            z-index: 2; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        } 
        /* साड़ी का पल्लू / डिज़ाइन */ 
        .saree-pallu { 
            position: absolute; 
            top: 0; 
            left: 20px; 
            width: 60px; 
            height: 100%; 
            background: linear-gradient(90deg, #f1c40f, #f39c12); 
            transform: skewX(-20deg); 
        } 
 
        /* सिर / चेहरा */ 
        .anchor-head { 
            position: absolute; 
            top: 65px; 
            width: 105px; 
            height: 120px; 
            background-color: #ffd2a1; 
            border-radius: 50px 50px 55px 55px; 
            z-index: 4; 
            transform-origin: bottom center; 
        } 
 
        /* फ्रंट हेयर और बिंदी */ 
        .hair-front { 
            position: absolute; 
            top: -5px; 
            left: 0; 
            width: 100%; 
            height: 40px; 
            background-color: #111; 
            border-radius: 50px 50px 0 0; 
        } 
        .bindi { 
            position: absolute; 
            top: 32px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 7px; 
            height: 7px; 
            background-color: #c0392b; 
            border-radius: 50%; 
        } 
 
        /* आँखें (Auto Blink) */ 
        .eye { 
            position: absolute; 
            top: 45px; 
            width: 16px; 
            height: 16px; 
            background-color: #fff; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transform-origin: center; 
        } 
        .eye-left { left: 22px; } 
        .eye-right { right: 22px; } 
        .pupil { 
            width: 8px; 
            height: 8px; 
            background-color: #2c3e50; 
            border-radius: 50%; 
        } 
 
        /* 👄 आवाज से चलने वाला मुँह (Voice Responsive Mouth) */ 
        .mouth-node { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 26px; 
            height: 8px; 
            background-color: #a04000; 
            border-radius: 2px 2px 6px 6px; 
            transform-origin: top center; 
            transition: height 0.05s ease, border-radius 0.05s ease; 
        } 
 
        /* न्यूज़ डेस्क (Table) */ 
        .news-desk { 
            position: absolute; 
            bottom: 25px; 
            left: 0; 
            width: 100%; 
            height: 50px; 
            background: linear-gradient(to bottom, #2c3e50, #1a252f); 
            border-top: 4px solid #f1c40f; 
            z-index: 5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        } 
        .desk-logo { 
            background-color: #f1c40f; 
            color: #111; 
            padding: 3px 20px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            border-radius: 4px; 
            box-shadow: 0 0 8px rgba(241, 196, 15, 0.4); 
        } 
 
        /* 📰 रनिंग न्यूज़ पट्टी (Ticker) */ 
        .ticker-bar { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 26px; 
            background-color: #c0392b; 
            z-index: 6; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
        } 
        .ticker-title { 
            background-color: #f1c40f; 
            color: #000; 
            font-weight: bold; 
            font-size: 0.75rem; 
            padding: 0 10px; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            z-index: 7; 
        } 
        .ticker-text { 
            display: inline-block; 
            white-space: nowrap; 
            padding-left: 100%; 
            font-size: 0.8rem; 
            font-weight: bold; 
            color: #fff; 
            animation: moveTicker 15s linear infinite; 
        } 
        @keyframes moveTicker { 
            0% { transform: translate3d(0, 0, 0); } 
            100% { transform: translate3d(-100%, 0, 0); } 
        } 
 
        /* 🎛️ कंट्रोलर हब और वॉइस रिकॉर्डर */ 
        .control-panel { 
            width: 100%; 
            max-width: 480px; 
            background: #1f2a38; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 15px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.4); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            border: 1px solid #2c3e50; 
        } 
 
        /* ऑडियो कंट्रोल्स */ 
        .audio-controls { 
            display: flex; 
            gap: 10px; 
        } 
        .btn { 
            flex: 1; 
            padding: 12px 5px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            transition: all 0.2s; 
        } 
        .btn:active { transform: scale(0.96); } 
        .btn-record { background-color: #e74c3c; } 
        .btn-record.recording { background-color: #922b21; animation: flash 1s infinite alternate; } 
        .btn-play { background-color: #2ecc71; } 
        .btn-play:disabled { background-color: #7f8c8d; cursor: not-allowed; } 
         
        @keyframes flash { 
            0% { opacity: 1; } 
            100% { opacity: 0.6; } 
        } 
 
        /* टाइमर और प्रोग्रेस बार */ 
        .timer-box { 
            background-color: #0e1720; 
            padding: 10px; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        } 
        .timer-info { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.8rem; 
            color: #bdc3c7; 
        } 
        .progress-bar-bg { 
            width: 100%; 
            height: 6px; 
            background-color: #2c3e50; 
            border-radius: 3px; 
            overflow: hidden; 
        } 
        .progress-bar-fill { 
            width: 0%; 
            height: 100%; 
            background-color: #f1c40f; 
            transition: width 1s linear; 
        } 
    </style> 
</head> 
<body> 
 
    <h2>Indian News Bulletin Engine</h2> 
    <p class="subtitle">अक्ल की जीत: लाइव वॉइस-सिंक और 5 मिनट रिकॉर्डिंग व्यवस्था</p> 
 
    <div class="stage"> 
        <div class="studio-screen"></div> 
 
        <div class="anchor-container"> 
            <div class="hair-back"></div> 
             
            <div class="anchor-body"> 
                <div class="saree-pallu"></div> 
            </div> 
             
            <div id="anchorHead" class="anchor-head"> 
                <div class="hair-front"></div> 
                <div class="bindi"></div> 
                <div id="eyeL" class="eye eye-left"><div class="pupil"></div></div> 
                <div id="eyeR" class="eye eye-right"><div class="pupil"></div></div> 
                <div id="anchorMouth" class="mouth-node"></div> 
            </div> 
        </div> 
 
        <div class="news-desk"> 
            <div class="desk-logo">तामीर अली NEWS</div> 
        </div> 
 
        <div class="ticker-bar"> 
            <div class="ticker-title">🚨 ब्रेकिंग न्यूज़</div> 
            <div class="ticker-text">तौहीद का मार्ग और अक्ल की जीत ही दुनिया का शाश्वत नियम है... अपनी आवाज रिकॉर्ड करें और लाइव बुलेटिन देखें... अधिकतम समय सीमा 5 मिनट है...</div> 
        </div> 
    </div> 
 
    <div class="control-panel"> 
        <div class="timer-box"> 
            <div class="timer-info"> 
                <span id="statusLabel">स्थिति: तैयार</span> 
                <span id="timerDisplay">00:00 / 05:00</span> 
            </div> 
            <div class="progress-bar-bg"> 
                <div id="progressBar" class="progress-bar-fill"></div> 
            </div> 
        </div> 
 
        <div class="audio-controls"> 
            <button id="recordBtn" class="btn btn-record">🎙️ रिकॉर्डिंग शुरू (Max 5 Min)</button> 
            <button id="playBtn" class="btn btn-play" disabled>▶️ बुलेटिन प्ले करें</button> 
        </div> 
    </div> 
 
    <script> 
        const mouthNode = document.getElementById('anchorMouth'); 
        const headNode = document.getElementById('anchorHead'); 
        const eyeL = document.getElementById('eyeL'); 
        const eyeR = document.getElementById('eyeR'); 
         
        const recordBtn = document.getElementById('recordBtn'); 
        const playBtn = document.getElementById('playBtn'); 
        const timerDisplay = document.getElementById('timerDisplay'); 
        const progressBar = document.getElementById('progressBar'); 
        const statusLabel = document.getElementById('statusLabel'); 
 
        let mediaRecorder; 
        let audioChunks = []; 
        let audioCtx, analyser, source, processor; 
        let audioUrl = null; 
        let audioPlayback = null; 
         
        let secondsElapsed = 0; 
        let timerInterval = null; 
        const maxSeconds = 300; // 5 मिनट लिमिट 
 
        // --- नेचुरल एनीमेशन लूप (आँखें झपकना और कोमल सिर हिलना) --- 
        let globalTime = 0; 
        function startNaturalMotion() { 
            function animate() { 
                globalTime += 0.08; 
                 
                // आँख झपकना 
                if (Math.sin(globalTime * 0.4) > 0.97) { 
                    eyeL.style.transform = "scaleY(0.1)"; 
                    eyeR.style.transform = "scaleY(0.1)"; 
                } else { 
                    eyeL.style.transform = "scaleY(1)"; 
                    eyeR.style.transform = "scaleY(1)"; 
                } 
 
                // सिर का हल्का सा हिलना 
                let tilt = Math.sin(globalTime * 0.2) * 2; 
                headNode.style.transform = `rotate(${tilt}deg)`; 
 
                requestAnimationFrame(animate); 
            } 
            requestAnimationFrame(animate); 
        } 
        startNaturalMotion(); 
 
        // --- रिकॉर्डिंग व्यवस्था --- 
        recordBtn.addEventListener('click', async () => { 
            if (mediaRecorder && mediaRecorder.state === "recording") { 
                stopRecording(); 
            } else { 
                startRecording(); 
            } 
        }); 
 
        async function startRecording() { 
            audioChunks = []; 
            secondsElapsed = 0; 
            if(audioPlayback) audioPlayback.pause(); 
             
            try { 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                mediaRecorder = new MediaRecorder(stream); 
                 
                // लाइव आवाज पकड़ने के लिए ऑडियो एनालाइजर सेटअप 
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                analyser = audioCtx.createAnalyser(); 
                source = audioCtx.createMediaStreamSource(stream); 
                source.connect(analyser); 
                analyser.fftSize = 256; 
                 
                const bufferLength = analyser.frequencyBinCount; 
                const dataArray = new Uint8Array(bufferLength); 
                 
                // बोलते समय रीयल-टाइम मुँह चलाने का फंक्शन 
                function trackVoice() { 
                    if (mediaRecorder && mediaRecorder.state === "recording") { 
                        analyser.getByteFrequencyData(dataArray); 
                        let sum = 0; 
                        for(let i=0; i<bufferLength; i++) sum += dataArray[i]; 
                        let average = sum / bufferLength; 
                         
                        // आवाज की वॉल्यूम के अनुसार मुंह का आकार तय करना 
                        let openScale = Math.min(average / 10, 4);  
                        if(openScale > 0.5) { 
                            mouthNode.style.height = `${8 + (openScale * 6)}px`; 
                            mouthNode.style.borderRadius = "50%"; 
                        } else { 
                            mouthNode.style.height = "8px"; 
                            mouthNode.style.borderRadius = "2px 2px 6px 6px"; 
                        } 
                        requestAnimationFrame(trackVoice); 
                    } 
                } 
                 
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data); 
                mediaRecorder.onstop = () => { 
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' }); 
                    audioUrl = URL.createObjectURL(audioBlob); 
                    audioPlayback = new Audio(audioUrl); 
                    playBtn.disabled = false; 
                     
                    // प्लेबैक के दौरान भी मुँह हिलाने की व्यवस्था 
                    setupPlaybackAnalyzer(audioBlob); 
                }; 
 
                mediaRecorder.start(); 
                trackVoice(); 
                 
                // टाइमर चालू करना 
                statusLabel.innerText = "स्थिति: रिकॉर्डिंग जारी..."; 
                recordBtn.innerText = "🛑 रिकॉर्डिंग रोकें"; 
                recordBtn.classList.add('recording'); 
                playBtn.disabled = true; 
                 
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    updateTimerUI(); 
                    if (secondsElapsed >= maxSeconds) { 
                        stopRecording(); 
                    } 
                }, 1000); 
 
            } catch (err) { 
                alert("माइक एक्सेस करने की अनुमति नहीं मिली: " + err); 
            } 
        } 
 
        function stopRecording() { 
            if (mediaRecorder) { 
                mediaRecorder.stop(); 
                mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
            } 
            clearInterval(timerInterval); 
            statusLabel.innerText = "स्थिति: रिकॉर्डिंग सुरक्षित"; 
            recordBtn.innerText = "🎙️ रिकॉर्डिंग शुरू (Max 5 Min)"; 
            recordBtn.classList.remove('recording'); 
            mouthNode.style.height = "8px"; 
            mouthNode.style.borderRadius = "2px 2px 6px 6px"; 
        } 
 
        function updateTimerUI() { 
            let min = Math.floor(secondsElapsed / 60).toString().padStart(2, '0'); 
            let sec = (secondsElapsed % 60).toString().padStart(2, '0'); 
            timerDisplay.innerText = `${min}:${sec} / 05:00`; 
            progressBar.style.width = `${(secondsElapsed / maxSeconds) * 100}%`; 
        } 
 
        // --- प्लेबैक ऑडियो एनालाइजर (सुनते समय होंठ हिलाना) --- 
        function setupPlaybackAnalyzer(blob) { 
            playBtn.onclick = () => { 
                audioPlayback.play(); 
                statusLabel.innerText = "स्थिति: बुलेटिन ऑन-एयर"; 
                 
                const playCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                const playAnalyser = playCtx.createAnalyser(); 
                const playSource = playCtx.createMediaElementSource(audioPlayback); 
                playSource.connect(playAnalyser); 
                playAnalyser.connect(playCtx.destination); 
                playAnalyser.fftSize = 256; 
                 
                const bufferLength = playAnalyser.frequencyBinCount; 
                const dataArray = new Uint8Array(bufferLength); 
                 
                function trackPlayback() { 
                    if (!audioPlayback.paused) { 
                        playAnalyser.getByteFrequencyData(dataArray); 
                        let sum = 0; 
                        for(let i=0; i<bufferLength; i++) sum += dataArray[i]; 
                        let average = sum / bufferLength; 
                         
                        let openScale = Math.min(average / 10, 4); 
                        if(openScale > 0.5) { 
                            mouthNode.style.height = `${8 + (openScale * 6)}px`; 
                            mouthNode.style.borderRadius = "50%"; 
                        } else { 
                            mouthNode.style.height = "8px"; 
                            mouthNode.style.borderRadius = "2px 2px 6px 6px"; 
                        } 
                        requestAnimationFrame(trackPlayback); 
                    } else { 
                        mouthNode.style.height = "8px"; 
                        mouthNode.style.borderRadius = "2px 2px 6px 6px"; 
                        statusLabel.innerText = "स्थिति: समाप्त"; 
                    } 
                } 
                trackPlayback(); 
            }; 
        } 
    </script> 
</body> 
</html>
