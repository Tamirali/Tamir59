<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On Studio</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        .btn-primary { background: #ff6b6b; color: #fff; font-weight: bold; cursor: pointer; }
        #status { color: #ffa500; text-align: center; margin: 10px 0; }
        img { max-width: 100%; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AI Try-On (GitHub Hosted)</h2>
        <input type="text" id="replicateKey" placeholder="Replicate Token (r8_...)">
        <input type="text" id="imgbbKey" placeholder="ImgBB Key">
        <button onclick="saveKeys()" style="background:#4CAF50; color:white;">Save Keys</button>
        
        <input type="file" id="modelInput" accept="image/*">
        <input type="file" id="garmentInput" accept="image/*">
        
        <button class="btn-primary" onclick="runAITryOn()">🤖 AI ट्राई-ऑन शुरू करें</button>
        
        <div id="status"></div>
        <img id="outputImage" src="" alt="">
    </div>

    <script>
        // सीधे Replicate API को कॉल करें (बिना फालतू के प्रॉक्सी के)
        async function runAITryOn() {
            const token = document.getElementById('replicateKey').value;
            const status = document.getElementById('status');
            
            status.innerText = "प्रोसेसिंग शुरू हो रही है...";
            
            try {
                // यहाँ हम सीधा Replicate API का इस्तेमाल कर रहे हैं
                const response = await fetch("https://api.replicate.com/v1/predictions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        version: "c87e6b95d17384768862804006c35c345f061e3895e54d320478065440d995cb",
                        input: {
                            human_img: "https://i.ibb.co/example.jpg", // यहाँ आपकी इमेज URL होगी
                            garm_img: "https://i.ibb.co/example.jpg",
                            garment_des: "clothing"
                        }
                    })
                });
                
                const data = await response.json();
                status.innerText = "AI काम कर रहा है, आईडी: " + data.id;
            } catch (err) {
                status.innerText = "एरर: " + err.message;
            }
        }

        function saveKeys() {
            localStorage.setItem('replicate_token', document.getElementById('replicateKey').value);
            alert("Keys Save हो गईं!");
        }
    </script>
</body>
</html>
