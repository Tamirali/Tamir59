<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎬 3D प्रोफेशनल स्टूडियो — हीरो</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border-glow: rgba(241, 196, 15, 0.12);
            --gold: #f1c40f;
            --gold-dim: rgba(241, 196, 15, 0.15);
            --red: #e74c3c;
            --red-dim: rgba(231, 76, 60, 0.15);
            --text-primary: #f0f0ff;
            --text-secondary: #a0a0c0;
            --text-dim: #606080;
            --shadow-glow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(241, 196, 15, 0.03), transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(231, 76, 60, 0.03), transparent 60%);
            overflow-x: hidden;
        }

        /* ===== MAIN SHELL ===== */
        .studio {
            max-width: 1260px;
            width: 100%;
            background: var(--bg-secondary);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            position: relative;
        }

        /* ===== 3D STAGE ===== */
        .stage {
            position: relative;
            padding: 30px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 560px;
            background: radial-gradient(ellipse at 50% 70%, #1a2a3a, #060612 95%);
            overflow: hidden;
            perspective: 1200px;
            perspective-origin: 50% 50%;
        }

        .stage::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.01) 2px, rgba(255, 255, 255, 0.01) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 255, 255, 0.01) 2px, rgba(255, 255, 255, 0.01) 4px);
            pointer-events: none;
            opacity: 0.15;
        }

        /* 3D ग्लो रिंग्स */
        .stage-glow-ring {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 1px solid rgba(241, 196, 15, 0.06);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(20deg) rotateY(10deg);
            pointer-events: none;
            animation: spinRing 30s linear infinite;
        }
        .stage-glow-ring2 {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 1px solid rgba(241, 196, 15, 0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(-15deg) rotateY(20deg);
            pointer-events: none;
            animation: spinRing 40s linear infinite reverse;
        }
        @keyframes spinRing {
            0% {
                transform: translate(-50%, -50%) rotateX(20deg) rotateY(10deg) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotateX(20deg) rotateY(10deg) rotate(360deg);
            }
        }
        @keyframes spinRing2 {
            0% {
                transform: translate(-50%, -50%) rotateX(-15deg) rotateY(20deg) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotateX(-15deg) rotateY(20deg) rotate(360deg);
            }
        }

        .stage-glow-dot {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(241, 196, 15, 0.07), transparent 70%);
            top: 10%;
            right: 5%;
            pointer-events: none;
            filter: blur(20px);
            transform: translateZ(-100px);
        }

        .stage-header {
            position: absolute;
            top: 18px;
            left: 24px;
            right: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .stage-header .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .stage-header .brand .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }
        .stage-header .badge {
            background: var(--gold-dim);
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border: 1px solid rgba(241, 196, 15, 0.12);
        }

        /* ===== PORTRAIT WRAP — 3D ===== */
        .portrait-wrap {
            position: relative;
            width: clamp(200px, 28vw, 320px);
            z-index: 2;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.6));
            transform-style: preserve-3d;
            transition: transform 0.08s ease-out;
            will-change: transform;
        }
        .portrait-wrap svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            transform: translateZ(20px);
            backface-visibility: hidden;
        }

        /* ===== 3D स्पीच बबल ===== */
        .speech-bubble {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%) scale(0.9) translateZ(30px);
            background: rgba(255, 255, 255, 0.96);
            color: #0a0a1a;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(241, 196, 15, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(8px);
            transform-style: preserve-3d;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%) translateZ(-5px);
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid rgba(255, 255, 255, 0.96);
        }
        .speech-bubble.visible {
            opacity: 1;
            transform: translateX(-50%) scale(1) translateZ(30px);
        }

        /* ===== WAVEFORM ===== */
        .waveform-wrap {
            position: absolute;
            bottom: 18px;
            left: 8%;
            right: 8%;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 8;
            transform: translateZ(0);
        }
        #waveformCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ===== PANEL (RIGHT) ===== */
        .panel {
            background: rgba(16, 16, 38, 0.95);
            backdrop-filter: blur(12px);
            padding: 22px 24px 26px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 620px;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
        }
        .panel::-webkit-scrollbar {
            width: 3px;
        }
        .panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .panel::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        .section-label {
            font-size: 0.55rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label .icon {
            font-size: 0.7rem;
        }

        .lock-btn {
            background: var(--red-dim);
            color: var(--red);
            padding: 9px 14px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            width: 100%;
            border: 1px solid rgba(231, 76, 60, 0.15);
            transition: all var(--transition);
            cursor: pointer;
        }
        .lock-btn:hover {
            background: rgba(231, 76, 60, 0.2);
        }
        .lock-btn.locked {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            border-color: rgba(255, 255, 255, 0.04);
        }

        .audio-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .play-btn {
            background: var(--red);
            color: #fff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.1rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 20px rgba(231, 76, 60, 0.3);
        }
        .play-btn:hover {
            transform: scale(1.05);
        }
        .play-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .play-btn.playing {
            background: #e67e22;
            box-shadow: 0 4px 20px rgba(230, 126, 34, 0.3);
        }
        .audio-progress {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .audio-progress input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            accent-color: var(--gold);
            cursor: pointer;
        }
        .audio-progress input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--gold);
            border: 2px solid var(--bg-secondary);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
            cursor: pointer;
        }
        .time-label {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 32px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 4px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .v-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.5rem;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .v-control span:first-child {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            opacity: 0.5;
        }
        .v-slider {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 14px;
            height: 52px;
            accent-color: var(--gold);
            cursor: pointer;
            background: transparent;
        }
        .v-slider:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        .v-val {
            font-size: 0.5rem;
            font-weight: 800;
            color: var(--text-primary);
            min-width: 18px;
        }

        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .emotion-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 5px 2px;
            font-size: 0.5rem;
            font-weight: 700;
            color: var(--text-secondary);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .emotion-btn .emoji {
            font-size: 1rem;
            line-height: 1.2;
        }
        .emotion-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .emotion-btn.active {
            border-color: var(--gold);
            background: var(--gold-dim);
            color: #fff;
            box-shadow: 0 0 24px rgba(241, 196, 15, 0.06);
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .action-btn {
            flex: 1;
            min-width: 44px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all var(--transition);
            cursor: pointer;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }
        .action-btn.test {
            background: rgba(46, 204, 113, 0.08);
            color: #2ecc71;
            border-color: rgba(46, 204, 113, 0.1);
        }
        .action-btn.test:hover {
            background: rgba(46, 204, 113, 0.15);
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .color-picker-wrap input[type="color"] {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 1px;
            background: transparent;
            cursor: pointer;
        }
        .scale-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .scale-wrap input[type="range"] {
            width: 44px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            accent-color: var(--gold);
            cursor: pointer;
        }
        .scale-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold);
            border: 1px solid var(--bg-secondary);
            cursor: pointer;
        }

        .speech-row {
            display: flex;
            gap: 6px;
        }
        .speech-row input[type="text"] {
            flex: 1;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            outline: none;
            transition: border var(--transition);
        }
        .speech-row input[type="text"]:focus {
            border-color: var(--gold);
        }
        .speech-row input[type="text"]::placeholder {
            color: var(--text-dim);
        }
        .speech-row button {
            background: var(--gold-dim);
            color: var(--gold);
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 700;
            border: 1px solid rgba(241, 196, 15, 0.1);
            cursor: pointer;
            transition: all var(--transition);
        }
        .speech-row button:hover {
            background: rgba(241, 196, 15, 0.2);
        }

        .bottom-row {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }
        .bottom-row .btn-sm {
            padding: 4px 12px;
            font-size: 0.5rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: all var(--transition);
            font-weight: 600;
        }
        .bottom-row .btn-sm:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }
        .bottom-row .color-bg-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .bottom-row .color-bg-wrap input[type="color"] {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            padding: 1px;
            background: transparent;
            cursor: pointer;
        }

        .upload-zone {
            border: 1.5px dashed rgba(255, 255, 255, 0.08);
            padding: 8px 6px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.55rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .upload-zone:hover {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.04);
        }
        .upload-zone.uploaded {
            border-color: #2ecc71;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.06);
        }

        .status {
            font-size: 0.6rem;
            color: var(--text-secondary);
            padding: 2px 0;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status .led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .status .led.idle {
            background: var(--text-dim);
        }
        .status .led.ready {
            background: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
        }
        .status .led.playing {
            background: var(--gold);
            box-shadow: 0 0 12px rgba(241, 196, 15, 0.3);
            animation: pulse-dot 0.8s ease-in-out infinite;
        }

        .kb-hint {
            font-size: 0.45rem;
            color: var(--text-dim);
            text-align: center;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }
        .kb-hint kbd {
            background: rgba(255, 255, 255, 0.04);
            padding: 0 6px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.45rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .studio {
                grid-template-columns: 1fr;
                border-radius: 20px;
            }
            .stage {
                min-height: 380px;
                padding: 20px 16px 16px;
            }
            .panel {
                max-height: 520px;
                padding: 16px 18px 20px;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.04);
            }
            .portrait-wrap {
                width: clamp(150px, 32vw, 220px);
            }
            .emotion-grid {
                grid-template-columns: repeat(7, 1fr);
            }
            .controls-grid {
                gap: 2px;
                padding: 4px 2px;
            }
            .v-slider {
                height: 42px;
                width: 12px;
            }
            .stage-header .brand {
                font-size: 0.6rem;
            }
            .stage-header .badge {
                font-size: 0.45rem;
                padding: 2px 10px;
            }
            .speech-bubble {
                font-size: 0.65rem;
                padding: 5px 14px;
                max-width: 160px;
            }
        }

        @media (max-width: 420px) {
            .panel {
                padding: 12px 12px 16px;
                max-height: 440px;
            }
            .controls-grid {
                gap: 1px;
            }
            .v-slider {
                height: 34px;
                width: 10px;
            }
            .v-control {
                font-size: 0.4rem;
            }
            .v-control span:first-child {
                font-size: 0.35rem;
            }
            .v-val {
                font-size: 0.4rem;
                min-width: 14px;
            }
            .emotion-grid {
                gap: 2px;
            }
            .emotion-btn {
                font-size: 0.4rem;
                padding: 3px 1px;
            }
            .emotion-btn .emoji {
                font-size: 0.8rem;
            }
            .action-btn {
                font-size: 0.45rem;
                padding: 4px 5px;
                min-width: 32px;
            }
            .play-btn {
                width: 36px;
                height: 36px;
                font-size: 0.85rem;
            }
            .time-label {
                font-size: 0.4rem;
                min-width: 24px;
            }
            .speech-row input {
                font-size: 0.5rem;
                padding: 4px 10px;
            }
            .speech-row button {
                font-size: 0.5rem;
                padding: 4px 12px;
            }
            .upload-zone {
                font-size: 0.45rem;
                padding: 6px 4px;
            }
            .lock-btn {
                font-size: 0.55rem;
                padding: 6px 10px;
            }
            .bottom-row .btn-sm {
                font-size: 0.4rem;

<body>

                    <!-- Eyes -->

                <div class="v-control"><span>Mouth X</span><input type="range" id="posX" class="v-slider setting-field" min="165" max="215" value="190" /><span class="v-val" id="posXVal">190</span></div>

                <button class="emotion-btn" data-emotion="sad"><span class="emoji">😢</span> Sad</button>

                <input type="text" id="speechText" placeholder="बोलें..." value="नमस्ते! 👋" />

                    🖌️ <input type="color" id="bgColor" value="#1a1a3e" />

                <button class="btn-sm" id="resetBtn">⟳ Reset</button>
                <button class="btn-sm" id="exportBtn">💾 Export</button>

                <input type="file" id="importFileInput" accept=".json" style="display:none;" />

            <div class="section-label"><span class="icon">📂</span> अपलोड</div>

            <div class="status" id="status">
                <span class="led idle" id="statusLed"></span>

            <div class="kb-hint">

    <audio id="audioPlayer" style="display:none;"></audio>

    <script>
        (function() {
            'use strict';

            // ===== DOM REFS =====
            const eyesY = document.getElementById('eyesY'),
                eyesYVal = document.getElementById('eyesYVal');
            const posY = document.getElementById('posY'),
                posYVal = document.getElementById('posYVal');
            const posX = document.getElementById('posX'),
                posXVal = document.getElementById('posXVal');
            const maxWidth = document.getElementById('maxWidth'),
                widthVal = document.getElementById('widthVal');
            const maxHeight = document.getElementById('maxHeight'),
                heightVal = document.getElementById('heightVal');
            const lipColor = document.getElementById('lipColor');
            const faceScale = document.getElementById('faceScale');
            const scaleLabel = document.getElementById('scaleLabel');
            const bgColor = document.getElementById('bgColor');
            const stageArea = document.getElementById('stageArea');
            const portraitWrap = document.getElementById('portraitWrap');

            const eyeL = document.getElementById('eyeL');
            const eyeR = document.getElementById('eyeR');
            const browL = document.getElementById('browL');
            const browR = document.getElementById('browR');
            const mouthOpen = document.getElementById('mouthOpen');

            const lockBtn = document.getElementById('lockBtn');
            const toggleEyesBtn = document.getElementById('toggleEyesBtn');
            const toggleBlinkBtn = document.getElementById('toggleBlinkBtn');
            const testMouthBtn = document.getElementById('testMouthBtn');
            const audioInput = document.getElementById('audioInput');
            const audioLabel = document.getElementById('audioLabel');
            const playBtn = document.getElementById('playBtn');
            const audioPlayer = document.getElementById('audioPlayer');
            const seekBar = document.getElementById('seekBar');
            const currentTimeLabel = document.getElementById('currentTime');
            const durationLabel = document.getElementById('duration');
            const volumeSlider = document.getElementById('volumeSlider');
            const muteToggle = document.getElementById('muteToggle');
            const speedSlider = document.getElementById('speedSlider');
            const speedLabel = document.getElementById('speedLabel');
            const speechText = document.getElementById('speechText');
            const speechBtn = document.getElementById('speechBtn');
            const speechBubble = document.getElementById('speechBubble');
            const resetBtn = document.getElementById('resetBtn');
            const exportBtn = document.getElementById('exportBtn');
            const importBtn = document.getElementById('importBtn');
            const importFileInput = document.getElementById('importFileInput');
            const statusText = document.getElementById('statusText');
            const statusLed = document.getElementById('statusLed');
            const waveformCanvas = document.getElementById('waveformCanvas');
            const emotionBtns = document.querySelectorAll('.emotion-btn');

            // ===== STATE =====
            let isLocked = false;
            let showEyes = true;
            let blinkEnabled = true;
            let blinkInterval = null;
            let isPlaying = false;
            let mouthInterval = null;
            let audioCtx = null;
            let analyser = null;
            let dataArray = null;
            let animationFrame = null;
            let isMuted = false;
            let previousVolume = 80;
            let currentEmotion = 'neutral';
            let testTimeout = null;

            // 3D माउस ट्रैकिंग
            let currentScale = 100;
            let currentRotX = 0;
            let currentRotY = 0;
            const MAX_ROT = 12; // डिग्री में अधिकतम घुमाव

            // ===== DEFAULTS =====
            const DEFAULTS = {
                eyesY: 205,
                posY: 278,
                posX: 190,
                maxWidth: 26,
                maxHeight: 8,
                lipColor: '#6e2929',
                faceScale: 100,
                bgColor: '#1a1a3e',
                showEyes: true,
                blinkEnabled: true,
                volume: 80,
                speed: 100,
            };

            // ===== MOUTH FUNCTION =====
            function setMouth(gap) {
                const maxGap = parseInt(maxHeight.value, 10) || 8;
                const ry = Math.min(Math.max(gap, 0), maxGap);
                mouthOpen.setAttribute('ry', ry);
                mouthOpen.setAttribute('fill', lipColor.value);
                mouthOpen.setAttribute('stroke', lipColor.value);
                mouthOpen.setAttribute('stroke-width', ry === 0 ? '1.5' : '1');
            }

            // ===== 3D TRANSFORM UPDATE =====
            function update3DTransform() {
                const scale = currentScale / 100;
                const rotX = currentRotX;
                const rotY = currentRotY;
                portraitWrap.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${scale})`;
            }

            // ===== SVG HELPERS =====
            function setEyeY(val) {
                const y = parseInt(val);
                eyeL.setAttribute('cy', y);
                eyeR.setAttribute('cy', y + 1);
                eyesYVal.textContent = y;
            }

            function setMouthY(val) {
                mouthOpen.setAttribute('cy', parseInt(val));
                posYVal.textContent = val;
            }

            function setMouthX(val) {
                mouthOpen.setAttribute('cx', parseInt(val));
                posXVal.textContent = val;
            }

            function setMouthWidth(val) {
                mouthOpen.setAttribute('rx', parseInt(val));
                widthVal.textContent = val;
            }

            function setMouthGap(val) {
                heightVal.textContent = val;
                setMouth(val);
            }

            function setLipColor(color) {
                mouthOpen.setAttribute('fill', color);
                mouthOpen.setAttribute('stroke', color);
            }

            function setFaceScale(val) {
                currentScale = parseInt(val);
                scaleLabel.textContent = currentScale + '%';
                update3DTransform();
            }

            function setBgColor(color) {
                stageArea.style.background = `radial-gradient(ellipse at 50% 70%, #1a2a3a, ${color} 95%)`;
            }

            function setBrowPosition(yOffset) {
                browL.setAttribute('d', `M133 ${190 + yOffset}c16-8 32-8 46 2`);
                browR.setAttribute('d', `M208 ${192 + yOffset}c16-10 32-10 46 2`);
            }

            // ===== EMOTIONS =====
            const EMOTIONS = {
                neutral: { eyesY: 205, posY: 278, posX: 190, maxWidth: 26, maxHeight: 8, lipColor: '#6e2929',
                browY: 0 },
                happy: { eyesY: 198, posY: 272, posX: 190, maxWidth: 32, maxHeight: 12, lipColor: '#b3416b',
                browY: -4 },
                sad: { eyesY: 210, posY: 284, posX: 190, maxWidth: 22, maxHeight: 5, lipColor: '#4a2a5a', browY: 6 },
                angry: { eyesY: 200, posY: 282, posX: 188, maxWidth: 28, maxHeight: 6, lipColor: '#a02020', browY: -6 },
                surprised: { eyesY: 194, posY: 270, posX: 190, maxWidth: 36, maxHeight: 16, lipColor: '#c0722a',
                browY: -8 },
                cute: { eyesY: 202, posY: 276, posX: 190, maxWidth: 30, maxHeight: 10, lipColor: '#e84393', browY: -2 },
                cool: { eyesY: 198, posY: 280, posX: 192, maxWidth: 24, maxHeight: 6, lipColor: '#2d3436', browY: -2 },
            };

            function applyEmotion(em) {
                const p = EMOTIONS[em];
                if (!p) return;
                eyesY.value = p.eyesY;
                setEyeY(p.eyesY);
                posY.value = p.posY;
                setMouthY(p.posY);
                posX.value = p.posX;
                setMouthX(p.posX);
                maxWidth.value = p.maxWidth;
                setMouthWidth(p.maxWidth);
                maxHeight.value = p.maxHeight;
                setMouthGap(p.maxHeight);
                lipColor.value = p.lipColor;
                setLipColor(p.lipColor);
                setBrowPosition(p.browY);
            }

            // ===== 3D MOUSE TRACKING =====
            function handleMouseMove(e) {
                const rect = stageArea.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5; // -0.5 to 0.5
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                currentRotY = x * MAX_ROT * 1.2; // क्षैतिज
                currentRotX = -y * MAX_ROT * 1.2; // ऊर्ध्वाधर
                // लिमिट करें
                currentRotX = Math.min(Math.max(currentRotX, -MAX_ROT), MAX_ROT);
                currentRotY = Math.min(Math.max(currentRotY, -MAX_ROT), MAX_ROT);
                update3DTransform();
            }

            function reset3D() {
                currentRotX = 0;
                currentRotY = 0;
                update3DTransform();
            }

            // ===== LOCK =====
            lockBtn.addEventListener('click', () => {
                isLocked = !isLocked;
                document.querySelectorAll('.setting-field').forEach(f => f.disabled = isLocked);
                lockBtn.textContent = isLocked ? '🔓 सेटिंग्स लॉक हैं' : '🔒 लॉक सेटिंग्स';
                lockBtn.classList.toggle('locked', isLocked);
            });

            // ===== SLIDERS =====
            eyesY.addEventListener('input', e => setEyeY(e.target.value));
            posY.addEventListener('input', e => setMouthY(e.target.value));
            posX.addEventListener('input', e => setMouthX(e.target.value));
            maxWidth.addEventListener('input', e => setMouthWidth(e.target.value));
            maxHeight.addEventListener('input', e => setMouthGap(e.target.value));
            lipColor.addEventListener('input', e => setLipColor(e.target.value));
            faceScale.addEventListener('input', e => setFaceScale(e.target.value));
            bgColor.addEventListener('input', e => setBgColor(e.target.value));

            // ===== EYES TOGGLE =====
            toggleEyesBtn.addEventListener('click', () => {
                showEyes = !showEyes;
                eyeL.style.display = eyeR.style.display = showEyes ? '' : 'none';
                toggleEyesBtn.textContent = showEyes ? '👀 Eyes' : '👀 Off';
            });

            // ===== BLINK =====
            toggleBlinkBtn.addEventListener('click', () => {
                blinkEnabled = !blinkEnabled;
                toggleBlinkBtn.textContent = blinkEnabled ? '💤 Blink' : '💤 Off';
                if (!blinkEnabled) {
                    clearInterval(blinkInterval);
                    eyeL.setAttribute('ry', '8.5');
                    eyeR.setAttribute('ry', '8.5');
                } else startBlinkLoop();
            });

            function startBlinkLoop() {
                clearInterval(blinkInterval);
                blinkInterval = setInterval(() => {
                    if (!blinkEnabled || !showEyes) return;
                    if (Math.random() < 0.3) {
                        eyeL.setAttribute('ry', '1');
                        eyeR.setAttribute('ry', '1');
                        setTimeout(() => {
                            eyeL.setAttribute('ry', '8.5');
                            eyeR.setAttribute('ry', '8.5');
                        }, 120);
                    }
                }, 900);
            }
            startBlinkLoop();

            // ===== TEST MOUTH =====
            testMouthBtn.addEventListener('click', () => {
                setMouth(14);
                clearTimeout(testTimeout);
                testTimeout = setTimeout(() => {
                    if (!isPlaying) setMouth(0);
                }, 1000);
            });

            // ===== EMOTION BUTTONS =====
            emotionBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    emotionBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentEmotion = btn.dataset.emotion;
                    applyEmotion(currentEmotion);
                });
            });

            // ===== SPEECH BUBBLE =====
            speechBtn.addEventListener('click', () => {
                const text = speechText.value.trim() || 'नमस्ते! 👋';
                speechBubble.textContent = text;
                speechBubble.classList.add('visible');
                clearTimeout(speechBubble._hideTimer);
                speechBubble._hideTimer = setTimeout(() => {
                    speechBubble.classList.remove('visible');
                }, 4000);
            });
            speechText.addEventListener('keydown', e => { if (e.key === 'Enter') speechBtn.click(); });

            // ===== AUDIO UPLOAD =====
            audioInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                audioPlayer.src = URL.createObjectURL(file);
                audioLabel.textContent = '✅ ' + file.name;
                audioLabel.classList.add('uploaded');
                playBtn.disabled = false;
                statusText.textContent = file.name + ' — तैयार';
                statusLed.className = 'led ready';
                audioPlayer.load();
                audioPlayer.onloadedmetadata = () => {
                    durationLabel.textContent = formatTime(audioPlayer.duration);
                };
                setupAudioContext();
            });

            // ===== AUDIO CONTEXT & WAVEFORM =====
            function setupAudioContext() {
                try {
                    if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'closed') audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 128;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const source = audioCtx.createMediaElementSource(audioPlayer);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    drawWaveform();
                } catch (err) { console.warn('WebAudio issue', err); }
            }

            function drawWaveform() {
                if (!analyser) return;
                const ctx = waveformCanvas.getContext('2d');
                const rect = waveformCanvas.parentElement.getBoundingClientRect();
                waveformCanvas.width = rect.width || 300;
                waveformCanvas.height = rect.height || 32;

                function render() {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, waveformCanvas.width, waveformCanvas.height);
                    const barWidth = (waveformCanvas.width / dataArray.length) * 1.2;
                    let x = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const val = dataArray[i] / 255;
                        const h = val * waveformCanvas.height * 0.9;
                        const hue = 40 + val * 30;
                        ctx.fillStyle = `hsl(${hue}, 80%, ${50 + val * 30}%)`;
                        ctx.fillRect(x, waveformCanvas.height - h, Math.max(1, barWidth - 0.5), h);
                        x += barWidth + 0.5;
                    }
                    animationFrame = requestAnimationFrame(render);
                }
                cancelAnimationFrame(animationFrame);
                render();
            }

            // ===== PLAY / PAUSE =====
            playBtn.addEventListener('click', togglePlay);

            function togglePlay() {
                if (!audioPlayer.src) { alert('कृपया पहले ऑडियो फ़ाइल अपलोड करें!'); return; }
                if (audioPlayer.paused) {
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        playBtn.textContent = '⏸️';
                        playBtn.classList.add('playing');
                        statusText.textContent = '▶️ चल रहा है...';
                        statusLed.className = 'led playing';
                        startLipSync();
                        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    }).catch(err => alert('Play error: ' + err.message));
                } else {
                    audioPlayer.pause();
                    isPlaying = false;
                    playBtn.textContent = '▶️';
                    playBtn.classList.remove('playing');
                    statusText.textContent = '⏸️ रुका हुआ';
                    statusLed.className = 'led ready';
                    stopLipSync();
                }
            }

            // ===== LIP SYNC =====
            function startLipSync() {
                clearInterval(mouthInterval);
                mouthInterval = setInterval(() => {
                    if (!audioPlayer.paused && audioPlayer.currentTime > 0) {
                        const maxGap = parseInt(maxHeight.value, 10) || 8;
                        let gap = 0;
                        if (analyser && dataArray) {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                            const norm = sum / (dataArray.length * 255);
                            gap = Math.floor(1 + norm * (maxGap - 1));
                        } else {
                            gap = Math.floor(Math.random() * maxGap) + 1;
                        }
                        setMouth(Math.min(gap, maxGap));
                    } else {
                        setMouth(0);
                    }
                }, 70);
            }

            function stopLipSync() {
                clearInterval(mouthInterval);
                setMouth(0);
            }

            // ===== PROGRESS =====
            audioPlayer.ontimeupdate = () => {
                if (audioPlayer.duration) {
                    seekBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                    currentTimeLabel.textContent = formatTime(audioPlayer.currentTime);
                }
            };
            audioPlayer.onended = () => {
                isPlaying = false;
                playBtn.textContent = '▶️';
                playBtn.classList.remove('playing');
                stopLipSync();
                statusText.textContent = '⏹️ समाप्त';
                statusLed.className = 'led ready';
                seekBar.value = 0;
                currentTimeLabel.textContent = '0:00';
            };
            seekBar.oninput = (e) => {
                if (audioPlayer.duration) {
                    audioPlayer.currentTime = (e.target.value / 100) * audioPlayer.duration;
                }
            };

            function formatTime(t) {
                if (!t || isNaN(t)) return '0:00';
                const m = Math.floor(t / 60);
                const s = Math.floor(t % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            // ===== VOLUME =====
            volumeSlider.oninput = (e) => {
                const v = e.target.value / 100;
                audioPlayer.volume = v;
                if (v === 0) { isMuted = true;
                    muteToggle.textContent = '🔇'; } else { isMuted = false;
                    muteToggle.textContent = '🔊';
                    previousVolume = parseInt(e.target.value); }
            };
            muteToggle.onclick = () => {
                isMuted = !isMuted;
                if (isMuted) {
                    previousVolume = parseInt(volumeSlider.value);
                    volumeSlider.value = 0;
                    audioPlayer.volume = 0;
                    muteToggle.textContent = '🔇';
                } else {
                    volumeSlider.value = previousVolume || 80;
                    audioPlayer.volume = previousVolume / 100;
                    muteToggle.textContent = '🔊';
                }
            };

            // ===== SPEED =====
            speedSlider.oninput = (e) => {
                const speed = e.target.value / 100;
                audioPlayer.playbackRate = speed;
                speedLabel.textContent = speed.toFixed(1) + 'x';
            };

            // ===== RESET =====
            resetBtn.onclick = () => {
                location.reload();
            };

            // ===== EXPORT =====
            exportBtn.onclick = () => {
                const data = {
                    eyesY: eyesY.value,
                    posY: posY.value,
                    posX: posX.value,
                    maxWidth: maxWidth.value,
                    maxHeight: maxHeight.value,
                    lipColor: lipColor.value,
                    faceScale: faceScale.value,
                    bgColor: bgColor.value,
                    showEyes: showEyes,
                    blinkEnabled: blinkEnabled,
                    volume: volumeSlider.value,
                    speed: speedSlider.value,
                    emotion: currentEmotion,
                    speechText: speechText.value,
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'studio-3d-settings.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            // ===== IMPORT =====
            importBtn.onclick = () => importFileInput.click();
            importFileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.eyesY) { eyesY.value = data.eyesY;
                            eyesY.dispatchEvent(new Event('input'));
                            setEyeY(data.eyesY); }
                        if (data.posY) { posY.value = data.posY;
                            posY.dispatchEvent(new Event('input'));
                            setMouthY(data.posY); }
                        if (data.posX) { posX.value = data.posX;
                            posX.dispatchEvent(new Event('input'));
                            setMouthX(data.posX); }
                        if (data.maxWidth) { maxWidth.value = data.maxWidth;
                            maxWidth.dispatchEvent(new Event('input'));
                            setMouthWidth(data.maxWidth); }
                        if (data.maxHeight) { maxHeight.value = data.maxHeight;
                            maxHeight.dispatchEvent(new Event('input'));
                            setMouthGap(data.maxHeight); }
                        if (data.lipColor) { lipColor.value = data.lipColor;
                            setLipColor(data.lipColor); }
                        if (data.faceScale) { faceScale.value = data.faceScale;
                            setFaceScale(data.faceScale); }
                        if (data.bgColor) { bgColor.value = data.bgColor;
                            setBgColor(data.bgColor); }
                        if (data.showEyes !== undefined) {
                            showEyes = data.showEyes;
                            eyeL.style.display = eyeR.style.display = showEyes ? '' : 'none';
                            toggleEyesBtn.textContent = showEyes ? '👀 Eyes' : '👀 Off';
                        }
                        if (data.blinkEnabled !== undefined) {
                            blinkEnabled = data.blinkEnabled;
                            toggleBlinkBtn.textContent = blinkEnabled ? '💤 Blink' : '💤 Off';
                            if (blinkEnabled) startBlinkLoop();
                            else { clearInterval(blinkInterval);
                                eyeL.setAttribute('ry', '8.5');
                                eyeR.setAttribute('ry', '8.5'); }
                        }
                        if (data.volume) { volumeSlider.value = data.volume;
                            audioPlayer.volume = data.volume / 100; }
                        if (data.speed) { speedSlider.value = data.speed;
                            audioPlayer.playbackRate = data.speed / 100;
                            speedLabel.textContent = (data.speed / 100).toFixed(1) + 'x'; }
                        if (data.emotion) {
                            emotionBtns.forEach(b => b.classList.remove('active'));
                            const target = document.querySelector('.emotion-btn[data-emotion="' + data.emotion + '"]');
                            if (target) { target.classList.add('active');
                                currentEmotion = data.emotion;
                                applyEmotion(data.emotion); }
                        }
                        if (data.speechText) speechText.value = data.speechText;
                        alert('✅ सेटिंग्स आयात हो गईं!');
                    } catch (err) { alert('❌ अमान्य फ़ाइल: ' + err.message); }
                };
                reader.readAsText(file);
                importFileInput.value = '';
            };

            // ===== KEYBOARD SHORTCUTS =====
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === ' ' || e.key === 'Space') { e.preventDefault();
                    togglePlay(); }
                if (e.key === 'ArrowRight' && audioPlayer.duration) { e.preventDefault();
                    audioPlayer.currentTime = Math.min(audioPlayer.currentTime + 3, audioPlayer.duration); }
                if (e.key === 'ArrowLeft' && audioPlayer.duration) { e.preventDefault();
                    audioPlayer.currentTime = Math.max(audioPlayer.currentTime - 3, 0); }
                if (e.key === 'ArrowUp') { e.preventDefault(); const v = Math.min(100, parseInt(volumeSlider.value) + 5);
                    volumeSlider.value = v;
                    audioPlayer.volume = v / 100; if (v > 0) { isMuted = false;
                        muteToggle.textContent = '🔊'; } }
                if (e.key === 'ArrowDown') { e.preventDefault(); const v = Math.max(0, parseInt(volumeSlider.value) - 5);
                    volumeSlider.value = v;
                    audioPlayer.volume = v / 100; if (v === 0) { isMuted = true;
                        muteToggle.textContent = '🔇'; } }
            });

            // ===== 3D MOUSE EVENTS =====
            stageArea.addEventListener('mousemove', handleMouseMove);
            stageArea.addEventListener('mouseleave', reset3D);

            // Touch समर्थन (मोबाइल)
            stageArea.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                if (!touch) return;
                const rect = stageArea.getBoundingClientRect();
                const x = (touch.clientX - rect.left) / rect.width - 0.5;
                const y = (touch.clientY - rect.top) / rect.height - 0.5;
                currentRotY = x * MAX_ROT * 1.2;
                currentRotX = -y * MAX_ROT * 1.2;
                currentRotX = Math.min(Math.max(currentRotX, -MAX_ROT), MAX_ROT);
                currentRotY = Math.min(Math.max(currentRotY, -MAX_ROT), MAX_ROT);
                update3DTransform();
            }, { passive: true });
            stageArea.addEventListener('touchend', reset3D);

            // ===== CLEANUP =====
            window.addEventListener('beforeunload', () => {
                clearInterval(blinkInterval);
                clearInterval(mouthInterval);
                cancelAnimationFrame(animationFrame);
                if (audioCtx) audioCtx.close();
            });

            // ===== INIT =====
            setBgColor(DEFAULTS.bgColor);
            setFaceScale(DEFAULTS.faceScale);
            setEyeY(DEFAULTS.eyesY);
            setMouthY(DEFAULTS.posY);
            setMouthX(DEFAULTS.posX);
            setMouthWidth(DEFAULTS.maxWidth);
            setMouthGap(DEFAULTS.maxHeight);
            setLipColor(DEFAULTS.lipColor);
            setMouth(0);
            playBtn.disabled = true;
            statusText.textContent = 'ऑडियो अपलोड करें';
            statusLed.className = 'led idle';
            setTimeout(setupAudioContext, 500);

            console.log('🎬 3D प्रोफेशनल स्टूडियो — हीरो लोड हो गया!');
        })();
    </script>

</body>
