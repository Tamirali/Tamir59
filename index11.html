<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#142f2b" />
    <title>Tamir Ali Visfot News - Accurate Lip Position Record</title>
    <style>
        :root {
            --ink: #17332f;
            --paper: #fbf5e9;
            --red: #bf4d3c;
            --gold: #e9b949;
            --green: #3f7568;
            --white: #fffdf7;
            --shadow: 0 24px 70px rgba(8, 31, 27, 0.32);
            --record-red: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { min-width: 320px; background: #0a1f1b; }
        body {
            min-height: 100vh; min-height: 100dvh;
            display: grid; place-items: center;
            overflow-x: hidden;
            color: var(--ink);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1f1b;
        }
        button, input { font: inherit; }
        button { cursor: pointer; border: none; outline: none; }

        .shell {
            position: relative;
            width: 100%; max-width: 520px;
            min-height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
            background: var(--paper);
            box-shadow: var(--shadow);
        }
        @media (min-width: 600px) {
            .shell {
                border-radius: 32px 12px 32px 12px;
                min-height: min(920px, 100dvh);
                max-height: 98dvh;
                margin: 8px auto;
            }
        }

        .stage {
            position: relative;
            flex: 0 0 auto;
            min-height: 460px;
            padding: clamp(20px, 4vw, 36px) clamp(16px, 3vw, 28px);
            overflow: hidden;
            color: var(--white);
            background: linear-gradient(180deg, rgba(13,38,34,0.15), rgba(13,38,34,0.70)), var(--green);
            border-bottom: 4px solid var(--gold);
        }
        .stage-mark {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }
        .stage-mark h1 {
            font-size: 1.1rem; font-weight: 700;
            color: #f5cf70; text-transform: uppercase;
            flex: 1; min-width: 120px;
        }
        .stage-top-actions {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .rec-btn-top {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px 6px 12px;
            border-radius: 99px;
            font-weight: 700; font-size: 0.7rem;
            color: #fff;
            background: var(--red);
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(191,77,60,0.35);
            border: 1px solid rgba(255,255,255,0.15);
            white-space: nowrap;
        }
        .rec-btn-top.recording {
            background: var(--record-red);
            animation: pulse-rec-btn 1s infinite;
        }
        .rec-btn-top .dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; }
        .rec-indicator {
            display: flex; align-items: center; gap: 6px;
            padding: 3px 10px; border-radius: 99px;
            background: rgba(0,0,0,0.45); font-size: 0.55rem; color: rgba(255,255,255,0.7);
        }
        .rec-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
        .rec-indicator.active .dot { background: var(--record-red); animation: pulse-rec 1s infinite; }
        @keyframes pulse-rec { 50% { opacity: 0.4; } }

        .portrait-wrap {
            position: relative;
            width: clamp(220px, 60vw, 320px);
            margin: 10px auto 0;
            border-radius: 16px;
        }
        .portrait-wrap img {
            display: block; width: 100%; height: auto;
            border-radius: 16px; object-fit: cover;
            aspect-ratio: 380 / 470;
        }

        .mouth-overlay {
            --lip-x: 0px;
            --lip-y: 0px;   
            --lip-scale: 1; 
            --lip-rotate: 0deg;
            --lip-flip: 1;
            position: absolute;
            left: calc(50% + var(--lip-x));
            top: calc(58% + var(--lip-y));
            width: calc(28% * var(--lip-scale));
            height: calc(12% * var(--lip-scale));
            transform: translate(-50%, -50%) rotate(var(--lip-rotate)) scaleX(var(--lip-flip));
            transform-origin: center center;
            z-index: 3;
            pointer-events: none;
        }
        .mouth-overlay svg { width: 100%; height: 100%; display: none; }
        .mouth-overlay svg.active { display: block !important; }

        #mouthOpenFull, #mouthOpenHalf { opacity: 0; transform-origin: center; }
        #mouthClosedFull, #mouthClosedHalf { opacity: 1; transform-origin: center; }

        .news-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: var(--red); color: #fff; display: flex;
            align-items: center; font-size: 0.75rem; font-weight: bold;
            overflow: hidden; border-top: 2px solid var(--gold);
        }
        .ticker-title { background: var(--gold); color: #000; padding: 4px 10px; white-space: nowrap; z-index: 2; }
        .ticker-text { white-space: nowrap; padding-left: 100%; display: inline-block; animation: marquee 12s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0,0); } 100% { transform: translate(-100%,0); } }

        .panel { flex: 1; display: flex; flex-direction: column; padding: 16px; background: var(--paper); overflow-y: auto; gap: 12px; }
        .controls-box { padding: 12px; border: 1px solid rgba(23,51,47,0.1); border-radius: 12px; background: rgba(255,253,247,0.7); }
        .slider-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .slider-item { flex: 1; min-width: 75px; font-size: 0.65rem; }
        .slider-item input { width: 100%; }

        .lip-command-btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .cmd-btn {
            flex: 1; padding: 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;
            background: #d8cebc; color: var(--ink); transition: 0.2s;
        }
        .cmd-btn.active { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(63,117,104,0.4); }

        .upload-zone { border: 1.5px dashed #9a8d79; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.9rem; background: rgba(255,255,255,0.5); }
        .player { display: none; margin-top: 8px; }
        .player.is-visible { display: block; }

        .save-btn {
            background: var(--green); color: #fff; padding: 12px 20px;
            border-radius: 8px; font-weight: 700; font-size: 1rem; width: 100%;
        }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .bottom-actions-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 8px;
        }

        .hidden-canvas { position: absolute; top: -9999px; left: -9999px; width: 380px; height: 470px; pointer-events: none; opacity: 0; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; z-index: 999; }
    </style>
</head>
<body>

    <main class="shell">
        <section class="stage" id="stageArea">
            <header class="stage-mark">
                <h1>📰 तामीर अली विस्फोटक न्यूज़</h1>
                <div class="stage-top-actions">
                    <button class="rec-btn-top" id="recBtnTop">
                        <span class="dot"></span><span>Record</span>
                    </button>
                    <div class="rec-indicator" id="recIndicator">
                        <span class="dot"></span><span id="recIndicatorLabel">IDLE</span>
                    </div>
                </div>
            </header>

            <div class="portrait-wrap" id="portraitWrap">
                <img id="faceImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 380 470'%3E%3Crect width='380' height='470' fill='%231b2a26'/%3E%3Ccircle cx='190' cy='180' r='70' fill='%233a5a52'/%3E%3Ctext x='190' y='310' font-family='system-ui' font-size='22' fill='%239aa8a2' text-anchor='middle'%3EUpload Face Image%3C/text%3E%3C/svg%3E" alt="Face" />
                
                <div class="mouth-overlay" id="mouthOverlay">
                    <svg id="svgFullLips" class="active" viewBox="0 0 120 60" preserveAspectRatio="xMidYMid meet">
                        <path id="mouthClosedFull" d="M10 32 Q60 28 110 32 M12 32 Q60 35 108 32" fill="none" stroke="#803328" stroke-width="6" stroke-linecap="round" />
                        <g id="mouthOpenFull">
                            <ellipse cx="60" cy="36" rx="46" ry="20" fill="#42130e" />
                            <path d="M22 28 Q60 30 98 28 Q60 24 22 28Z" fill="#ffffff" />
                            <path d="M28 44 Q60 38 92 44 Q60 50 28 44Z" fill="#c95b53" />
                        </g>
                    </svg>

                    <svg id="svgHalfLips" viewBox="0 0 100 80" preserveAspectRatio="xMidYMid meet">
                        <path id="mouthClosedHalf" d="M10 40 Q45 32 85 42 M10 40 Q50 50 85 42" fill="none" stroke="#803328" stroke-width="7" stroke-linecap="round" />
                        <g id="mouthOpenHalf">
                            <path d="M10 40 Q50 15 85 42 Q50 68 10 40Z" fill="#3a100a" />
                            <path d="M18 35 Q45 26 75 38 Q50 32 18 35Z" fill="#ffffff" />
                            <path d="M25 50 Q50 42 75 46 Q50 58 25 50Z" fill="#c95b53" />
                        </g>
                    </svg>
                </div>
            </div>

            <div class="news-ticker">
                <div class="ticker-title">BREAKING NEWS</div>
                <div class="ticker-text">तामीर अली विस्फोटक न्यूज़ पोर्टल में आपका स्वागत है...</div>
            </div>
        </section>

        <section class="panel">
            <div class="controls-box">
                <b>🎯 Lips Selection Command (कमांड चुनें)</b>
                <div class="lip-command-btn-group">
                    <button id="cmdFullBtn" class="cmd-btn active">👄 Full Lips (Front)</button>
                    <button id="cmdHalfBtn" class="cmd-btn">💋 Half Lips (Side)</button>
                </div>

                <div class="slider-group">
                    <div class="slider-item">X-Pos <input type="range" id="lipX" min="-120" max="120" value="0" /></div>
                    <div class="slider-item">Y-Pos <input type="range" id="lipY" min="-120" max="120" value="0" /></div>
                    <div class="slider-item">Scale <input type="range" id="lipScale" min="40" max="180" value="100" /></div>
                    <div class="slider-item">Rotate (<span id="degLabel">0°</span>) <input type="range" id="lipRotate" min="-180" max="180" value="0" /></div>
                    <div class="slider-item" id="flipContainer" style="display:none;">Flip <button id="flipBtn" style="width:100%; font-size:0.65rem; background:var(--green); color:#fff; padding:3px; border-radius:4px;">Flip L/R</button></div>
                </div>
            </div>

            <label class="upload-zone">
                🎵 ऑडियो फाइल चुनें (MP3, WAV)
                <input type="file" id="audioInput" accept="audio/*" hidden />
            </label>

            <div class="player" id="player">
                <button id="playPauseButton" style="background:var(--green); width:100%; padding:10px; border-radius:8px; font-weight:bold; color:#fff;">▶ Play Audio</button>
            </div>

            <div class="bottom-actions-container">
                <label class="upload-zone">
                    📸 चेहरा अपलोड करें (JPEG, PNG)
                    <input type="file" id="faceInput" accept="image/*" hidden />
                </label>

                <button class="save-btn" id="saveBtn" disabled>💾 Save Video to Gallery</button>
            </div>
        </section>

        <canvas id="recordCanvas" class="hidden-canvas" width="380" height="470"></canvas>
    </main>

    <script>
        (function() {
            'use strict';

            const faceInput = document.getElementById('faceInput');
            const faceImage = document.getElementById('faceImage');
            const audioInput = document.getElementById('audioInput');
            const mouthOverlay = document.getElementById('mouthOverlay');
            
            const svgFullLips = document.getElementById('svgFullLips');
            const svgHalfLips = document.getElementById('svgHalfLips');
            const mouthOpenFull = document.getElementById('mouthOpenFull');
            const mouthClosedFull = document.getElementById('mouthClosedFull');
            const mouthOpenHalf = document.getElementById('mouthOpenHalf');
            const mouthClosedHalf = document.getElementById('mouthClosedHalf');

            const portraitWrap = document.getElementById('portraitWrap');
            const stageArea = document.getElementById('stageArea');
            const recBtnTop = document.getElementById('recBtnTop');
            const recIndicator = document.getElementById('recIndicator');
            const recIndicatorLabel = document.getElementById('recIndicatorLabel');
            const playPauseButton = document.getElementById('playPauseButton');
            const player = document.getElementById('player');
            const saveBtn = document.getElementById('saveBtn');
            const recordCanvas = document.getElementById('recordCanvas');
            
            const cmdFullBtn = document.getElementById('cmdFullBtn');
            const cmdHalfBtn = document.getElementById('cmdHalfBtn');
            const flipBtn = document.getElementById('flipBtn');
            const flipContainer = document.getElementById('flipContainer');

            let audioContext, audioBuffer, sourceNode, analyserNode, audioDestinationNode;
            let isPlaying = false, isRecording = false;
            let mediaRecorder, recordedChunks = [], animFrame, recordedBlob = null;
            let canvasStream = null, canvasTrack = null, drawInterval = null;

            let activeLipCommand = 'full';
            let flipDirection = 1;

            const lipX = document.getElementById('lipX');
            const lipY = document.getElementById('lipY');
            const lipScale = document.getElementById('lipScale');
            const lipRotate = document.getElementById('lipRotate');
            const degLabel = document.getElementById('degLabel');

            function updateLips() {
                mouthOverlay.style.setProperty('--lip-x', lipX.value + 'px');
                mouthOverlay.style.setProperty('--lip-y', lipY.value + 'px');
                mouthOverlay.style.setProperty('--lip-scale', lipScale.value / 100);
                mouthOverlay.style.setProperty('--lip-rotate', lipRotate.value + 'deg');
                mouthOverlay.style.setProperty('--lip-flip', flipDirection);
                degLabel.textContent = lipRotate.value + '°';
            }
            [lipX, lipY, lipScale, lipRotate].forEach(el => el.addEventListener('input', updateLips));

            cmdFullBtn.addEventListener('click', () => {
                activeLipCommand = 'full';
                cmdFullBtn.classList.add('active');
                cmdHalfBtn.classList.remove('active');
                svgFullLips.classList.add('active');
                svgHalfLips.classList.remove('active');
                flipContainer.style.display = 'none';
                updateLips();
            });

            cmdHalfBtn.addEventListener('click', () => {
                activeLipCommand = 'half';
                cmdHalfBtn.classList.add('active');
                cmdFullBtn.classList.remove('active');
                svgHalfLips.classList.add('active');
                svgFullLips.classList.remove('active');
                flipContainer.style.display = 'block';
                updateLips();
            });

            flipBtn.addEventListener('click', () => {
                flipDirection *= -1;
                updateLips();
            });

            faceInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => faceImage.src = ev.target.result;
                    reader.readAsDataURL(file);
                }
            });

            audioInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        if (!audioContext) audioContext = new(window.AudioContext || window.webkitAudioContext)();
                        const arrayBuffer = await file.arrayBuffer();
                        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                        player.classList.add('is-visible');
                        showToast('🎵 Audio loaded!', 'success');
                    } catch (err) {
                        showToast('⚠️ Audio Error: ' + err.message, 'error');
                    }
                }
            });

            function animateFace() {
                if (!isPlaying || !analyserNode) return;
                const samples = new Uint8Array(analyserNode.fftSize);
                analyserNode.getByteTimeDomainData(samples);
                let energy = 0;
                for (const s of samples) {
                    const norm = (s - 128) / 128;
                    energy += norm * norm;
                }
                const rms = Math.sqrt(energy / samples.length);
                const open = Math.min(1, Math.max(0, (rms - 0.01) * 8));
                
                if (activeLipCommand === 'full') {
                    mouthOpenFull.style.opacity = open;
                    mouthClosedFull.style.opacity = 1 - open;
                } else {
                    mouthOpenHalf.style.opacity = open;
                    mouthClosedHalf.style.opacity = 1 - open;
                }
                
                animFrame = requestAnimationFrame(animateFace);
            }

            playPauseButton.addEventListener('click', () => {
                if (isPlaying) {
                    sourceNode?.stop();
                    isPlaying = false;
                    playPauseButton.textContent = "▶ Play Audio";
                    mouthOpenFull.style.opacity = 0; mouthClosedFull.style.opacity = 1;
                    mouthOpenHalf.style.opacity = 0; mouthClosedHalf.style.opacity = 1;
                    cancelAnimationFrame(animFrame);
                    return;
                }
                if (!audioBuffer) return showToast('⚠️ Upload audio first!', 'error');

                if (audioContext.state === 'suspended') audioContext.resume();
                sourceNode = audioContext.createBufferSource();
                analyserNode = audioContext.createAnalyser();
                audioDestinationNode = audioContext.createMediaStreamDestination();
                sourceNode.buffer = audioBuffer;
                analyserNode.fftSize = 256;
                sourceNode.connect(analyserNode);
                sourceNode.connect(audioContext.destination);
                sourceNode.connect(audioDestinationNode);
                sourceNode.start(0);
                isPlaying = true;
                playPauseButton.textContent = "⏸ Pause Audio";
                animateFace();
                sourceNode.onended = () => {
                    isPlaying = false;
                    playPauseButton.textContent = "▶ Play Audio";
                    mouthOpenFull.style.opacity = 0; mouthClosedFull.style.opacity = 1;
                    mouthOpenHalf.style.opacity = 0; mouthClosedHalf.style.opacity = 1;
                };
            });

            // FIXED EXACT POSITIONING CANVAS RENDERER
            const ctx = recordCanvas.getContext('2d');
            const CANVAS_W = 380, CANVAS_H = 470;

            function drawStageToCanvas() {
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

                // Background
                const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
                grad.addColorStop(0, '#3f7568'); grad.addColorStop(1, '#1f3f38');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                const wrapRect = portraitWrap.getBoundingClientRect();
                const mouthRect = mouthOverlay.getBoundingClientRect();

                // Compute exact center and dimensions relative to portraitWrap
                const relCenterX = (mouthRect.left + mouthRect.width / 2) - wrapRect.left;
                const relCenterY = (mouthRect.top + mouthRect.height / 2) - wrapRect.top;

                const mouthX = (relCenterX / wrapRect.width) * CANVAS_W;
                const mouthY = (relCenterY / wrapRect.height) * CANVAS_H;
                const mouthW = (mouthRect.width / wrapRect.width) * CANVAS_W;
                const mouthH = (mouthRect.height / wrapRect.height) * CANVAS_H;

                // Draw Face Image
                if (faceImage.complete && faceImage.naturalWidth > 0) {
                    ctx.drawImage(faceImage, 0, 0, CANVAS_W, CANVAS_H);
                }

                // Draw Mouth at Exact Position
                const angleRad = (parseFloat(lipRotate.value) || 0) * (Math.PI / 180);

                ctx.save();
                ctx.translate(mouthX, mouthY);
                ctx.rotate(angleRad);
                if (activeLipCommand === 'half' && flipDirection === -1) {
                    ctx.scale(-1, 1);
                }

                if (activeLipCommand === 'full') {
                    ctx.strokeStyle = '#803328';
                    ctx.lineWidth = Math.max(3, mouthH * 0.12);
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(-mouthW * 0.4, 0);
                    ctx.quadraticCurveTo(0, -mouthH * 0.15, mouthW * 0.4, 0);
                    ctx.stroke();

                    const openVal = parseFloat(mouthOpenFull.style.opacity) || 0;
                    if (openVal > 0.05) {
                        ctx.globalAlpha = openVal;
                        ctx.fillStyle = '#42130e';
                        ctx.beginPath();
                        ctx.ellipse(0, 2, mouthW * 0.38, mouthH * 0.32, 0, 0, 2 * Math.PI);
                        ctx.fill();

                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.ellipse(0, -mouthH * 0.1, mouthW * 0.28, mouthH * 0.12, 0, 0, 2 * Math.PI);
                        ctx.fill();

                        ctx.fillStyle = '#c95b53';
                        ctx.beginPath();
                        ctx.ellipse(0, mouthH * 0.15, mouthW * 0.22, mouthH * 0.12, 0, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                } else if (activeLipCommand === 'half') {
                    ctx.strokeStyle = '#803328';
                    ctx.lineWidth = Math.max(3, mouthH * 0.12);
                    ctx.beginPath();
                    ctx.moveTo(-mouthW * 0.4, 0);
                    ctx.quadraticCurveTo(0, -mouthH * 0.2, mouthW * 0.4, mouthH * 0.1);
                    ctx.stroke();

                    const openVal = parseFloat(mouthOpenHalf.style.opacity) || 0;
                    if (openVal > 0.05) {
                        ctx.globalAlpha = openVal;
                        ctx.fillStyle = '#3a100a';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, mouthW * 0.38, mouthH * 0.35, 0, 0, 2 * Math.PI);
                        ctx.fill();

                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.rect(-mouthW * 0.22, -mouthH * 0.25, mouthW * 0.44, mouthH * 0.15);
                        ctx.fill();

                        ctx.fillStyle = '#c95b53';
                        ctx.beginPath();
                        ctx.ellipse(0, mouthH * 0.12, mouthW * 0.22, mouthH * 0.12, 0, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
                ctx.restore();

                // News Ticker
                ctx.fillStyle = 'rgba(191,77,60,0.92)';
                ctx.fillRect(0, CANVAS_H - 28, CANVAS_W, 28);
                ctx.fillStyle = '#e9b949';
                ctx.font = 'bold 10px system-ui';
                ctx.fillText('BREAKING NEWS |  तामीर अली विस्फोटक न्यूज़', 10, CANVAS_H - 8);
            }

            function startCanvasDraw() { if (!drawInterval) drawInterval = setInterval(drawStageToCanvas, 33); }
            function stopCanvasDraw() { clearInterval(drawInterval); drawInterval = null; }

            recBtnTop.addEventListener('click', async () => {
                if (isRecording) { stopRecording(); return; }
                try {
                    startCanvasDraw();
                    canvasStream = recordCanvas.captureStream(30);
                    canvasTrack = canvasStream.getVideoTracks()[0];

                    const tracks = [canvasTrack];
                    if (audioDestinationNode?.stream.getAudioTracks().length) {
                        tracks.push(audioDestinationNode.stream.getAudioTracks()[0]);
                    }

                    mediaRecorder = new MediaRecorder(new MediaStream(tracks), { mimeType: 'video/webm' });
                    recordedChunks = [];
                    mediaRecorder.ondataavailable = e => e.data.size > 0 && recordedChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        recordedBlob = new Blob(recordedChunks, { type: 'video/webm' });
                        saveBtn.disabled = false;
                        recBtnTop.classList.remove('recording');
                        recIndicator.classList.remove('active');
                        recIndicatorLabel.textContent = "IDLE";
                        stopCanvasDraw();
                        isRecording = false;
                        showToast('✅ Recording complete!', 'success');
                    };

                    mediaRecorder.start(1000);
                    isRecording = true;
                    recBtnTop.classList.add('recording');
                    recIndicator.classList.add('active');
                    recIndicatorLabel.textContent = "REC";
                } catch (err) {
                    showToast('⚠️ Recording Error: ' + err.message, 'error');
                }
            });

            function stopRecording() { if (mediaRecorder && isRecording) mediaRecorder.stop(); }

            saveBtn.addEventListener('click', () => {
                if (!recordedBlob) return;
                const name = 'VisfotNews_' + Date.now() + '.webm';
                const url = URL.createObjectURL(recordedBlob);
                const a = document.createElement('a');
                a.href = url; a.download = name; a.click();
                showToast('💾 Video Saved!', 'success');
            });

            function showToast(msg) {
                const div = document.createElement('div');
                div.className = 'toast-msg'; div.textContent = msg;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }

            updateLips();
            startCanvasDraw();
        })();
    </script>
</body>
</html>
