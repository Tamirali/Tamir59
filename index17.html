<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>3D Dance · Boy & Girl</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            background: #0a0c18;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            overflow-x: hidden;
        }
        .app {
            width: 100%;
            max-width: 1100px;
            background: rgba(10,12,24,0.85);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            padding: 20px 24px 24px;
            backdrop-filter: blur(8px);
        }
        @media (max-width:700px) {
            .app { padding:12px; border-radius:24px; }
        }
        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .file-btn {
            background: rgba(167,139,250,0.12);
            border: 1px solid rgba(167,139,250,0.2);
            color: #fff;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition:0.25s;
            position:relative;
        }
        .file-btn:hover { background: rgba(167,139,250,0.22); transform:scale(1.02); }
        .file-btn input {
            position:absolute;
            opacity:0;
            width:100%;
            height:100%;
            left:0; top:0;
            cursor:pointer;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #6b7280;
            transition:0.3s;
        }
        .dot.playing { background:#4ade80; box-shadow:0 0 16px rgba(74,222,128,0.4); }
        .dot.paused { background:#facc15; box-shadow:0 0 16px rgba(250,204,21,0.3); }
        /* ─── STAGE ─── */
        .stage {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 80%, #141a2e, #070912);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.6), 0 8px 32px rgba(0,0,0,0.3);
            aspect-ratio: 16 / 9;
            min-height: 240px;
            touch-action: none;
            margin-bottom: 14px;
        }
        #stageCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        /* ─── CONTROLS & PLAYLIST (No text on canvas, only UI) ─── */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .play-ctrl {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #f0f0f0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition:0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.08); transform:scale(1.05); }
        .ctrl-btn:active { transform:scale(0.92); }
        .ctrl-btn.play-btn {
            background: rgba(167,139,250,0.18);
            border-color: rgba(167,139,250,0.25);
            width: 50px; height: 50px;
            font-size: 22px;
        }
        .ctrl-btn.play-btn.paused {
            background: rgba(250,204,21,0.12);
            border-color: rgba(250,204,21,0.2);
        }
        .vol-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .vol-wrap input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 3px;
            border-radius: 4px;
            background: rgba(255,255,255,0.12);
            outline: none;
        }
        .vol-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #a78bfa;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .playlist-section {
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }
        .playlist {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 140px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .playlist::-webkit-scrollbar { width:4px; }
        .playlist::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius:10px; }
        .pl-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            transition:0.2s;
            cursor: pointer;
            gap: 8px;
        }
        .pl-item:hover { background: rgba(255,255,255,0.04); }
        .pl-item.active { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.12); }
        .pl-item .pl-name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(255,255,255,0.7);
            flex:1;
        }
        .pl-item .pl-remove {
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            cursor: pointer;
            padding: 2px 6px;
            opacity: 0.3;
            transition:0.2s;
        }
        .pl-item:hover .pl-remove { opacity:0.7; }
        .pl-item .pl-remove:hover { color:#f87171; opacity:1; }
        .empty-pl {
            text-align: center;
            padding: 16px;
            color: rgba(255,255,255,0.2);
            font-size: 13px;
        }
        .empty-pl .big { font-size:28px; display:block; margin-bottom:4px; }
        @media (max-width:500px) {
            .ctrl-btn { width:36px; height:36px; font-size:15px; }
            .ctrl-btn.play-btn { width:44px; height:44px; font-size:20px; }
            .vol-wrap input[type="range"] { width:44px; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo"><h1>🎵 3D Duo</h1></div>
        <div class="actions">
            <div class="file-btn">
                📁 Add Songs
                <input type="file" id="fileInput" accept="audio/*" multiple />
            </div>
            <div class="status">
                <span class="dot stopped" id="statusDot"></span>
                <span id="statusLabel">Ready</span>
            </div>
        </div>
    </div>

    <!-- Stage (Canvas) – No text overlays -->
    <div class="stage">
        <canvas id="stageCanvas"></canvas>
    </div>

    <!-- Controls & Playlist -->
    <div class="controls-row">
        <div class="play-ctrl">
            <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
            <button class="ctrl-btn play-btn paused" id="playBtn" title="Play / Pause">▶</button>
            <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
        </div>
        <div class="vol-wrap">
            <button class="ctrl-btn" id="muteBtn" style="width:36px;height:36px;font-size:14px;">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="1.5" step="0.01" value="0.8" />
        </div>
    </div>

    <div class="playlist-section">
        <div class="playlist" id="playlistContainer">
            <div class="empty-pl"><span class="big">🎶</span>Add songs to start the 3D show</div>
        </div>
    </div>
</div>

<script>
    // ──────────────────────────────────────────────────────────────
    //  3D BOY & GIRL · Automatic Dance with STRONG Lip Sync
    //  No text on canvas · Fully 3D shaded characters
    // ──────────────────────────────────────────────────────────────

    const canvas = document.getElementById('stageCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const playlistContainer = document.getElementById('playlistContainer');

    let W, H;
    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        W = rect.width;
        H = rect.height;
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    // ─── AUDIO STATE ───
    let audioCtx = null, analyser = null, dataArray = null, gainNode = null, sourceNode = null;
    let isPlaying = false, isMuted = false, volumeGain = 0.8;
    let currentIndex = -1, playlist = [];
    let startTime = 0, pausedAt = 0, duration = 0;
    let animId = null, isDragging = false;
    let amplitude = 0, dancePhase = 0;

    // Stars
    const stars = [];
    for (let i=0; i<70; i++) {
        stars.push({ x: Math.random(), y: Math.random(), r: 0.5+Math.random()*2.5, a: 0.2+Math.random()*0.5, speed: 0.2+Math.random()*0.8 });
    }

    // ─── CHARACTER STATES for special moves ───
    const charStates = [
        { special: false, hand: null, timer: 0, duration: 1.8, startX:0, startY:0, targetX:0, targetY:0, progress:0 },
        { special: false, hand: null, timer: 0, duration: 1.8, startX:0, startY:0, targetX:0, targetY:0, progress:0 }
    ];

    // ─── PLAYLIST FUNCTIONS ───
    function updatePlaylistUI() {
        const n = playlist.length;
        if (n === 0) {
            playlistContainer.innerHTML = `<div class="empty-pl"><span class="big">🎶</span>Add songs to start the 3D show</div>`;
            statusDot.className = 'dot stopped';
            statusLabel.textContent = 'No songs';
            return;
        }
        let html = '';
        playlist.forEach((item, idx) => {
            const active = idx === currentIndex ? 'active' : '';
            const name = item.name.length > 35 ? item.name.slice(0,33)+'…' : item.name;
            html += `
                <div class="pl-item ${active}" data-idx="${idx}">
                    <span class="pl-name">${name}</span>
                    <button class="pl-remove" data-idx="${idx}">✕</button>
                </div>
            `;
        });
        playlistContainer.innerHTML = html;
        document.querySelectorAll('.pl-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.closest('.pl-remove')) return;
                const idx = parseInt(el.dataset.idx);
                if (idx === currentIndex) { togglePlay(); return; }
                playTrack(idx);
            });
        });
        document.querySelectorAll('.pl-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeTrack(parseInt(btn.dataset.idx));
            });
        });
        if (currentIndex >=0 && currentIndex < playlist.length) {
            statusLabel.textContent = isPlaying ? 'Playing' : 'Paused';
            statusDot.className = 'dot ' + (isPlaying ? 'playing' : 'paused');
        } else {
            statusDot.className = 'dot stopped';
            statusLabel.textContent = 'Ready';
        }
    }

    function addTracks(files) {
        let added = 0;
        for (const f of files) {
            if (f.type.startsWith('audio/')) {
                playlist.push({ name: f.name, file: f, data: null });
                added++;
            }
        }
        if (added === 0) return;
        if (playlist.length > 0 && currentIndex === -1) {
            currentIndex = 0;
            loadAndPlay(0);
        } else {
            updatePlaylistUI();
        }
    }

    function removeTrack(idx) {
        if (playlist.length === 0) return;
        const was = isPlaying && idx === currentIndex;
        if (was) stopAudio();
        playlist.splice(idx, 1);
        if (playlist.length === 0) {
            currentIndex = -1;
            updatePlaylistUI();
            return;
        }
        if (idx < currentIndex) currentIndex--;
        else if (idx === currentIndex) {
            currentIndex = Math.min(idx, playlist.length - 1);
            loadAndPlay(currentIndex);
        }
        updatePlaylistUI();
    }

    function getCtx() {
        if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    async function loadAndPlay(idx) {
        if (idx < 0 || idx >= playlist.length) return;
        const track = playlist[idx];
        if (!track) return;
        try {
            const ctx = getCtx();
            let data = track.data;
            if (!data) {
                const buf = await track.file.arrayBuffer();
                data = await ctx.decodeAudioData(buf);
                track.data = data;
            }
            currentIndex = idx;
            duration = data.duration;
            pausedAt = 0;
            isPlaying = false;
            playBtn.textContent = '▶';
            playBtn.className = 'ctrl-btn play-btn paused';
            updatePlaylistUI();
            playTrack(idx);
        } catch (e) {
            console.error(e);
            statusDot.className = 'dot error';
            statusLabel.textContent = 'Error';
            alert('Could not load audio.');
        }
    }

    function playTrack(idx) {
        if (idx < 0 || idx >= playlist.length) return;
        const track = playlist[idx];
        if (!track || !track.data) { loadAndPlay(idx); return; }
        stopAudio();
        const ctx = getCtx();
        const data = track.data;
        duration = data.duration;
        pausedAt = 0;
        sourceNode = ctx.createBufferSource();
        sourceNode.buffer = data;
        analyser = ctx.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.85;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        gainNode = ctx.createGain();
        gainNode.gain.value = isMuted ? 0 : volumeGain;
        sourceNode.connect(gainNode);
        gainNode.connect(analyser);
        analyser.connect(ctx.destination);
        sourceNode.start(0, pausedAt);
        startTime = ctx.currentTime;
        isPlaying = true;
        currentIndex = idx;
        playBtn.textContent = '⏸';
        playBtn.className = 'ctrl-btn play-btn';
        statusDot.className = 'dot playing';
        statusLabel.textContent = 'Playing';
        updatePlaylistUI();
        dancePhase = 0;
        charStates.forEach(s => { s.special = false; s.timer = 0; });
        sourceNode.onended = () => {
            if (isPlaying) {
                isPlaying = false;
                playBtn.textContent = '▶';
                playBtn.className = 'ctrl-btn play-btn paused';
                statusDot.className = 'dot paused';
                statusLabel.textContent = 'Finished';
                const next = (currentIndex + 1) % playlist.length;
                if (next !== currentIndex && playlist.length > 1) {
                    setTimeout(() => playTrack(next), 500);
                } else {
                    updatePlaylistUI();
                }
            }
        };
    }

    function stopAudio() {
        if (sourceNode) {
            try { sourceNode.stop(); } catch(e) {}
            sourceNode.disconnect();
            sourceNode = null;
        }
        isPlaying = false;
        playBtn.textContent = '▶';
        playBtn.className = 'ctrl-btn play-btn paused';
        if (currentIndex >= 0 && currentIndex < playlist.length) {
            statusDot.className = 'dot paused';
            statusLabel.textContent = 'Paused';
        }
        updatePlaylistUI();
    }

    function togglePlay() {
        if (playlist.length === 0) { alert('Add some songs first!'); return; }
        if (currentIndex === -1) { currentIndex = 0; loadAndPlay(0); return; }
        const ctx = getCtx();
        if (ctx.state === 'suspended') ctx.resume();
        if (isPlaying) {
            if (sourceNode) {
                const elapsed = (ctx.currentTime - startTime) + pausedAt;
                pausedAt = Math.min(elapsed, duration);
                try { sourceNode.stop(); } catch(e) {}
                sourceNode.disconnect();
                sourceNode = null;
            }
            isPlaying = false;
            playBtn.textContent = '▶';
            playBtn.className = 'ctrl-btn play-btn paused';
            statusDot.className = 'dot paused';
            statusLabel.textContent = 'Paused';
            updatePlaylistUI();
        } else {
            const track = playlist[currentIndex];
            if (!track || !track.data) { loadAndPlay(currentIndex); return; }
            const data = track.data;
            duration = data.duration;
            if (pausedAt >= duration) pausedAt = 0;
            sourceNode = ctx.createBufferSource();
            sourceNode.buffer = data;
            analyser = ctx.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.85;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            gainNode = ctx.createGain();
            gainNode.gain.value = isMuted ? 0 : volumeGain;
            sourceNode.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(ctx.destination);
            sourceNode.start(0, pausedAt);
            startTime = ctx.currentTime;
            isPlaying = true;
            playBtn.textContent = '⏸';
            playBtn.className = 'ctrl-btn play-btn';
            statusDot.className = 'dot playing';
            statusLabel.textContent = 'Playing';
            updatePlaylistUI();
            sourceNode.onended = () => {
                if (isPlaying) {
                    isPlaying = false;
                    playBtn.textContent = '▶';
                    playBtn.className = 'ctrl-btn play-btn paused';
                    statusDot.className = 'dot paused';
                    statusLabel.textContent = 'Finished';
                    const next = (currentIndex + 1) % playlist.length;
                    if (next !== currentIndex && playlist.length > 1) {
                        setTimeout(() => playTrack(next), 500);
                    } else {
                        updatePlaylistUI();
                    }
                }
            };
        }
    }

    function nextTrack() {
        if (playlist.length === 0) return;
        const n = (currentIndex + 1) % playlist.length;
        if (n === currentIndex && playlist.length === 1) {
            pausedAt = 0;
            if (isPlaying) { togglePlay(); setTimeout(togglePlay, 100); } else playTrack(currentIndex);
            return;
        }
        playTrack(n);
    }

    function prevTrack() {
        if (playlist.length === 0) return;
        const n = (currentIndex - 1 + playlist.length) % playlist.length;
        playTrack(n);
    }

    volumeSlider.addEventListener('input', () => {
        volumeGain = parseFloat(volumeSlider.value);
        if (gainNode && !isMuted) gainNode.gain.value = volumeGain;
        if (isMuted && volumeGain > 0.01) {
            isMuted = false;
            muteBtn.textContent = '🔊';
            if (gainNode) gainNode.gain.value = volumeGain;
        }
    });
    muteBtn.addEventListener('click', () => {
        isMuted = !isMuted;
        muteBtn.textContent = isMuted ? '🔇' : '🔊';
        if (gainNode) gainNode.gain.value = isMuted ? 0 : volumeGain;
    });

    fileInput.addEventListener('change', (e) => {
        const files = e.target.files;
        if (files.length > 0) { addTracks(files); }
        fileInput.value = '';
    });

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') { e.preventDefault(); nextTrack(); }
        if (e.code === 'ArrowLeft') { e.preventDefault(); prevTrack(); }
    });

    function getAmp() {
        if (!analyser || !isPlaying || !dataArray) return 0;
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i=0; i<dataArray.length; i++) sum += dataArray[i];
        const avg = sum / dataArray.length;
        return Math.min(1, avg / 128);
    }

    function getFreq() {
        if (!analyser || !isPlaying || !dataArray) return new Float32Array(32).fill(0);
        analyser.getByteFrequencyData(dataArray);
        const out = new Float32Array(32);
        const step = Math.max(1, Math.floor(dataArray.length / 32));
        for (let i=0; i<32; i++) {
            let s = 0;
            for (let j=0; j<step && i*step+j<dataArray.length; j++) s += dataArray[i*step+j];
            out[i] = s / step / 255;
        }
        return out;
    }

    // ─── CHARACTER POSITION ───
    function getCharPosition(idx, phase, amp) {
        const baseX = (idx === 0) ? W * 0.28 : W * 0.72;
        const baseY = H * 0.62;
        const scale = Math.min(W, H) / 210;
        const sway = Math.sin(phase * 0.5 + idx * 1.8) * 40 * scale * (0.3 + amp * 0.3);
        const bob = Math.sin(phase * 0.7 + idx * 1.8) * 6 * scale + amp * 8 * scale;
        const state = charStates[idx];
        let offX=0, offY=0;
        if (state.special) { const t=state.progress; offX=(state.targetX-state.startX)*t; offY=(state.targetY-state.startY)*t; }
        return { x: baseX + sway + offX, y: baseY + bob + offY };
    }

    // ─── 3D DRAW CHARACTER ───
    function drawCharacter(idx, cx, cy, scale, amp, phase, specialHand, offsetX, offsetY, lipWeight) {
        const s = scale;
        // Base position with sway & offset
        const sway = Math.sin(phase * 0.5 + idx * 1.8) * 40 * s * (0.3 + amp * 0.3);
        const finalX = cx + sway + offsetX;
        const bob = Math.sin(phase * 0.7 + idx * 1.8) * 6 * s + amp * 8 * s;
        const finalY = cy + bob + offsetY;

        // 3D Spin effect (squash)
        let spinAngle = 0;
        if (amp > 0.4 && Math.sin(phase * 2 + idx * 1.8) > 0.6) {
            spinAngle = Math.sin(phase * 0.5 + idx * 1.8) * 0.25;
        }
        const isGirl = (idx === 1);

        ctx.save();
        ctx.translate(finalX, finalY);
        // 3D squash for spin
        const scaleX = 1 + spinAngle * 0.2;
        ctx.scale(scaleX, 1);

        // ─── FLOOR SHADOW (3D depth) ───
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 40;
        ctx.shadowOffsetY = 10;
        ctx.beginPath();
        ctx.ellipse(0, 40 * s, 50 * s, 12 * s, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fill();
        ctx.restore();

        // ─── LEGS ───
        const legSwing = 0.4 + amp * 0.6;
        const legL = Math.sin(phase * 1.3 + idx * 1.8 + spinAngle) * legSwing * s * 22;
        const legR = Math.sin(phase * 1.3 + Math.PI + idx * 1.8 + spinAngle * 0.5) * legSwing * s * 22;
        const legLen = 60 * s;

        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        if (isGirl) {
            // Girl legs (skin) + skirt
            for (const [lx, angle] of [[-14 * s, legL], [14 * s, legR]]) {
                const endX = lx + Math.sin(angle * 0.5) * 6 * s;
                const endY = legLen + 6 * s + Math.cos(angle * 0.5) * 4 * s;
                ctx.beginPath();
                ctx.moveTo(lx, 10 * s);
                ctx.lineTo(endX, endY);
                ctx.lineWidth = 8 * s;
                ctx.strokeStyle = '#f5d6c6';
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            // 3D Skirt (gradient)
            const skirtGrad = ctx.createRadialGradient(0, 20*s, 10*s, 0, 30*s, 50*s);
            skirtGrad.addColorStop(0, '#f472b6');
            skirtGrad.addColorStop(0.6, '#ec4899');
            skirtGrad.addColorStop(1, '#be185d');
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(-22 * s, 4 * s);
            ctx.quadraticCurveTo(-32 * s, 30*s, -28 * s, 54*s);
            ctx.lineTo(28 * s, 54*s);
            ctx.quadraticCurveTo(32 * s, 30*s, 22 * s, 4 * s);
            ctx.closePath();
            ctx.fillStyle = skirtGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1.5 * s;
            ctx.stroke();
        } else {
            // Boy pants
            for (const [lx, angle] of [[-16 * s, legL], [16 * s, legR]]) {
                const endX = lx + Math.sin(angle * 0.5) * 8 * s;
                const endY = legLen + 6 * s + Math.cos(angle * 0.5) * 4 * s;
                ctx.beginPath();
                ctx.moveTo(lx, 10 * s);
                ctx.lineTo(endX, endY);
                ctx.lineWidth = 12 * s;
                ctx.strokeStyle = '#1a1f35';
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(lx, 10 * s);
                ctx.lineTo(endX, endY);
                ctx.lineWidth = 5 * s;
                ctx.strokeStyle = '#4a3f6b';
                ctx.stroke();
                ctx.shadowBlur = 15;
            }
        }
        ctx.restore();

        // ─── TORSO (3D) ───
        const torsoW = isGirl ? 38 * s : 44 * s;
        const torsoH = isGirl ? 52 * s : 58 * s;
        ctx.save();
        ctx.shadowBlur = 25;
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        const grad = ctx.createLinearGradient(0, -10 * s, 0, torsoH);
        let c1, c2, c3;
        if (isGirl) {
            c1 = '#f472b6'; c2 = '#ec4899'; c3 = '#be185d';
        } else {
            c1 = '#818cf8'; c2 = '#6366f1'; c3 = '#4338ca';
        }
        grad.addColorStop(0, c1);
        grad.addColorStop(0.5, c2);
        grad.addColorStop(1, c3);
        ctx.beginPath();
        ctx.roundRect(-torsoW/2, -10 * s - 4, torsoW, torsoH + 8, 14 * s);
        ctx.fillStyle = grad;
        ctx.fill();
        // 3D highlight
        ctx.shadowBlur = 0;
        const hlGrad = ctx.createLinearGradient(-torsoW/2, 0, 0, 0);
        hlGrad.addColorStop(0, 'rgba(255,255,255,0)');
        hlGrad.addColorStop(0.3, 'rgba(255,255,255,0.08)');
        hlGrad.addColorStop(0.7, 'rgba(255,255,255,0)');
        ctx.fillStyle = hlGrad;
        ctx.fillRect(-torsoW/2, -10 * s - 4, torsoW, torsoH + 8);
        ctx.restore();

        // ─── ARMS (3D with depth) ───
        const armSwing = 0.5 + amp * 0.7;
        let aL = Math.sin(phase * 0.9 + 0.5 + idx * 1.8 + spinAngle * 0.3) * armSwing * s * 28;
        let aR = Math.sin(phase * 0.9 + 0.5 + Math.PI * 0.6 + idx * 1.8 + spinAngle * 0.3) * armSwing * s * 28;
        if (specialHand === 'left') { aL = -60 * s; }
        else if (specialHand === 'right') { aR = -60 * s; }

        const armLen = 50 * s;
        ctx.save();
        ctx.shadowBlur = 15;
        for (let i = 0; i < 2; i++) {
            const side = i === 0 ? -1 : 1;
            const ax = side * (torsoW/2 - 4*s);
            const ay = i === 0 ? aL : aR;
            let endX, endY;
            if ( (i === 0 && specialHand === 'left') || (i === 1 && specialHand === 'right') ) {
                const headY = -38 * s + Math.sin(phase * 0.4 + idx * 1.8) * 3 * s;
                endX = side * 12 * s;
                endY = headY - 40 * s;
            } else {
                endX = ax + side * 8 * s + ay * 0.3 + Math.sin(phase * 0.2 + i + idx) * 4 * s;
                endY = 2 * s + armLen + ay * 0.5;
            }
            ctx.beginPath();
            ctx.moveTo(ax, 2 * s);
            ctx.lineTo(endX, endY);
            ctx.lineWidth = 10 * s;
            ctx.strokeStyle = '#1a1f35';
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(ax, 2 * s);
            ctx.lineTo(endX, endY);
            ctx.lineWidth = 4 * s;
            const armColor = isGirl ? `hsl(${340 + i*10}, 80%, 70%)` : `hsl(${230 + i*20}, 80%, 70%)`;
            ctx.strokeStyle = armColor;
            ctx.stroke();
            // 3D hand glow
            ctx.shadowBlur = 25;
            const gradH = ctx.createRadialGradient(endX, endY, 2*s, endX, endY, 14*s);
            gradH.addColorStop(0, `rgba(255,255,255,${0.2 + amp * 0.3})`);
            gradH.addColorStop(1, 'rgba(167,139,250,0)');
            ctx.beginPath();
            ctx.arc(endX, endY, 14*s, 0, Math.PI * 2);
            ctx.fillStyle = gradH;
            ctx.fill();
        }
        ctx.restore();

        // ─── HEAD (3D Sphere) ───
        const headR = 34 * s;
        const headY = -38 * s + Math.sin(phase * 0.4 + idx * 1.8) * 3 * s;
        ctx.save();
        ctx.translate(0, headY);
        ctx.rotate(Math.sin(phase * 0.4 + idx * 1.8) * 0.04 + spinAngle * 0.1);
        ctx.shadowBlur = 30;
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        // 3D sphere gradient
        const headGrad = ctx.createRadialGradient(-10 * s, -12 * s, 6 * s, 0, 0, headR);
        headGrad.addColorStop(0, '#fff5ee');
        headGrad.addColorStop(0.3, '#fce8dc');
        headGrad.addColorStop(0.7, '#f5d6c6');
        headGrad.addColorStop(1, '#dbb0a0');
        ctx.beginPath();
        ctx.arc(0, 0, headR, 0, Math.PI * 2);
        ctx.fillStyle = headGrad;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(180,140,120,0.05)';
        ctx.lineWidth = 1.5 * s;
        ctx.stroke();

        // ─── HAIR ───
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        if (isGirl) {
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(0, -8*s, headR + 6*s, headR + 12*s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(10*s, -headR + 4*s);
            ctx.quadraticCurveTo(32*s, -headR - 20*s, 24*s, -headR - 50*s);
            ctx.quadraticCurveTo(12*s, -headR - 40*s, 0, -headR + 2*s);
            ctx.fillStyle = '#A0522D';
            ctx.fill();
            for (let side = -1; side <= 1; side+=2) {
                ctx.beginPath();
                ctx.ellipse(side * (headR - 2*s), -4*s, 10*s, 20*s, 0.2*side, 0, Math.PI * 2);
                ctx.fillStyle = '#8B4513';
                ctx.fill();
            }
        } else {
            for (let i = -3; i <= 3; i++) {
                const hx = i * 12 * s;
                const hy = -headR + 2 * s + Math.abs(i) * 3 * s;
                ctx.beginPath();
                ctx.ellipse(hx, hy, 8 * s, 12 * s + Math.abs(i) * 2 * s, 0.1 * i, 0, Math.PI * 2);
                ctx.fillStyle = i === 0 ? '#5c3d2e' : '#4a3024';
                ctx.fill();
            }
        }
        ctx.shadowBlur = 0;

        // ─── EYES ───
        const eyeY = -2 * s;
        const eyeOff = 14 * s;
        const lookX = Math.sin(phase * 0.3 + idx * 1.8) * 3 * s;
        const lookY = Math.cos(phase * 0.5 + idx * 1.8) * 2 * s;
        for (const side of [-1, 1]) {
            const ex = side * eyeOff + lookX * 0.3;
            const ey = eyeY + lookY * 0.2;
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.05)';
            ctx.beginPath();
            ctx.ellipse(ex, ey, 12 * s, 14 * s, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#fefcf9';
            ctx.fill();
            ctx.shadowBlur = 0;
            const irisX = ex + side * 3 * s + lookX * 0.4;
            const irisY = ey + lookY * 0.3;
            const irisG = ctx.createRadialGradient(irisX - 2 * s, irisY - 3 * s, 1 * s, irisX, irisY, 9 * s);
            irisG.addColorStop(0, '#6b4c3b');
            irisG.addColorStop(0.6, '#3d281e');
            irisG.addColorStop(1, '#1f110b');
            ctx.beginPath();
            ctx.arc(irisX, irisY, 9 * s, 0, Math.PI * 2);
            ctx.fillStyle = irisG;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(ex + side * 3 * s - 3 * s, ey - 4 * s, 3.5 * s, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + side * 5 * s + 2 * s, ey + 3 * s, 1.8 * s, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fill();
        }

        // ─── EYEBROWS ───
        ctx.strokeStyle = '#8b6b5a';
        ctx.lineWidth = 2.5 * s;
        ctx.lineCap = 'round';
        for (const side of [-1, 1]) {
            const bx = side * 22 * s;
            const by = -20 * s + Math.sin(phase * 0.3 + idx * 1.8) * 2 * s;
            ctx.beginPath();
            ctx.moveTo(bx - 12 * s, by - 2 * s);
            ctx.quadraticCurveTo(bx, by - 8 * s - amp * 3 * s, bx + 12 * s, by - 2 * s);
            ctx.stroke();
        }

        // ─── LIPS (VERY STRONG ALTERNATING SYNC) ───
        // lipWeight 0..1, we boost it heavily
        const lipFactor = 0.1 + 0.9 * lipWeight;
        // Mouth opens extremely wide on strong beats
        const mouthOpen = 2 * s + amp * 32 * s * lipFactor;
        const mouthY = 14 * s;
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(0,0,0,0.05)';
        // Upper lip
        ctx.beginPath();
        ctx.moveTo(-18 * s, mouthY - 2 * s);
        ctx.quadraticCurveTo(-9 * s, mouthY - 14 * s - mouthOpen * 0.4, 0, mouthY - 8 * s - mouthOpen * 0.3);
        ctx.quadraticCurveTo(9 * s, mouthY - 14 * s - mouthOpen * 0.4, 18 * s, mouthY - 2 * s);
        ctx.fillStyle = '#d4787a';
        ctx.fill();
        // Lower lip
        ctx.beginPath();
        ctx.moveTo(-18 * s, mouthY + 2 * s);
        ctx.quadraticCurveTo(-9 * s, mouthY + 16 * s + mouthOpen * 0.7, 0, mouthY + 10 * s + mouthOpen * 0.5);
        ctx.quadraticCurveTo(9 * s, mouthY + 16 * s + mouthOpen * 0.7, 18 * s, mouthY + 2 * s);
        ctx.fillStyle = '#e0888a';
        ctx.fill();

        // INNER MOUTH (very dark and large when open)
        if (mouthOpen > 6 * s) {
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(0, mouthY + 2 * s + mouthOpen * 0.1, 14 * s, mouthOpen * 0.35, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#3d0a0a';
            ctx.fill();
            // Tongue hint
            if (mouthOpen > 14 * s) {
                ctx.beginPath();
                ctx.ellipse(3 * s, mouthY + 8 * s + mouthOpen * 0.2, 10 * s, 6 * s + mouthOpen * 0.15, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,120,100,0.5)';
                ctx.fill();
            }
        }

        // ─── BLUSH ───
        ctx.globalAlpha = isGirl ? 0.2 : 0.1;
        ctx.globalAlpha *= (0.2 + amp * 0.1);
        for (const side of [-1, 1]) {
            const bx = side * 34 * s;
            const by = 14 * s;
            const g = ctx.createRadialGradient(bx, by, 2*s, bx, by, 18*s);
            g.addColorStop(0, isGirl ? '#ff8a8a' : '#f5a0a0');
            g.addColorStop(1, 'rgba(245,160,160,0)');
            ctx.beginPath();
            ctx.arc(bx, by, 18*s, 0, Math.PI * 2);
            ctx.fillStyle = g;
            ctx.fill();
        }
        ctx.restore(); // head transform

        // ─── 3D AURA ───
        ctx.save();
        const aura = ctx.createRadialGradient(0, 20*s, 10*s, 0, 20*s, 160*s);
        const aIntensity = 0.04 + amp * 0.12;
        aura.addColorStop(0, `rgba(167,139,250,${aIntensity})`);
        aura.addColorStop(0.5, `rgba(244,114,182,${aIntensity * 0.4})`);
        aura.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = aura;
        ctx.fillRect(-180 * s, -140 * s, 360 * s, 280 * s);
        ctx.restore();

        ctx.restore(); // main translate & scale
    }

    // ─── DRAW STAGE ───
    function drawStage() {
        if (W === 0 || H === 0) return;
        ctx.clearRect(0, 0, W, H);

        // Background
        const bgGrad = ctx.createRadialGradient(W/2, H*0.7, 50, W/2, H*0.7, W*0.7);
        bgGrad.addColorStop(0, '#1a1f35');
        bgGrad.addColorStop(0.6, '#0d0f1a');
        bgGrad.addColorStop(1, '#05060a');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // 3D Floor
        const floorY = H * 0.78;
        ctx.save();
        ctx.globalAlpha = 0.15;
        const floorGrad = ctx.createRadialGradient(W/2, floorY, 20, W/2, floorY, W*0.5);
        floorGrad.addColorStop(0, `rgba(167,139,250,${0.05 + amplitude * 0.06})`);
        floorGrad.addColorStop(0.5, `rgba(167,139,250,${0.02 + amplitude * 0.03})`);
        floorGrad.addColorStop(1, 'rgba(167,139,250,0)');
        ctx.fillStyle = floorGrad;
        ctx.beginPath();
        ctx.ellipse(W/2, floorY, W*0.4, 30, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Stars
        for (const st of stars) {
            const sx = st.x * W;
            const sy = st.y * H;
            const bright = st.a * (0.6 + 0.4 * Math.sin(performance.now() * 0.001 * st.speed + st.x * 10));
            ctx.save();
            ctx.globalAlpha = bright * 0.3;
            ctx.beginPath();
            ctx.arc(sx, sy, st.r * (0.8 + 0.2 * amplitude), 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = `rgba(167,139,250,${bright * 0.2})`;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.restore();
        }

        // ─── LIP SYNC WEIGHTS (Alternating) ───
        const lipOsc = Math.sin(dancePhase * 0.5);
        const weight1 = (lipOsc + 1) / 2; // 0..1
        const weight2 = 1 - weight1;

        // ─── DRAW CHARACTERS ───
        const scale = Math.min(W, H) / 210;
        const cy = H * 0.62;
        const basePositions = [W * 0.28, W * 0.72];

        for (let idx = 0; idx < 2; idx++) {
            const state = charStates[idx];
            let offX = 0, offY = 0;
            if (state.special) {
                const t = state.progress;
                offX = (state.targetX - state.startX) * t;
                offY = (state.targetY - state.startY) * t;
            }
            const lipWeight = idx === 0 ? weight1 : weight2;
            drawCharacter(
                idx,
                basePositions[idx], cy,
                scale,
                amplitude,
                dancePhase + idx * 1.8,
                state.hand,
                offX, offY,
                lipWeight
            );
        }

        // Beat ring (3D effect)
        if (amplitude > 0.1) {
            ctx.save();
            const r = 60 + amplitude * 80;
            ctx.globalAlpha = 0.1 + amplitude * 0.12;
            ctx.beginPath();
            ctx.ellipse(W/2, cy + 20, r, r * 0.4, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(167,139,250,${0.1 + amplitude * 0.15})`;
            ctx.lineWidth = 2 + amplitude * 4;
            ctx.shadowColor = `rgba(167,139,250,${amplitude * 0.2})`;
            ctx.shadowBlur = 40;
            ctx.stroke();
            ctx.restore();
        }

        // Sparkles
        if (amplitude > 0.2) {
            const n = Math.floor(amplitude * 10) + 2;
            for (let i=0; i<n; i++) {
                const ang = Math.random() * Math.PI * 2;
                const r = 30 + Math.random() * 200;
                const sx = W/2 + Math.cos(ang) * r;
                const sy = cy + 20 + Math.sin(ang) * r * 0.5;
                const sz = 2 + Math.random() * 6 * amplitude;
                ctx.save();
                ctx.globalAlpha = 0.3 + Math.random() * 0.4;
                ctx.shadowColor = `rgba(255,255,255,${0.2 + Math.random() * 0.3})`;
                ctx.shadowBlur = 20 + Math.random() * 30;
                ctx.fillStyle = `hsl(${240 + Math.random() * 60}, 100%, 80%)`;
                ctx.beginPath();
                ctx.arc(sx, sy, sz, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
    }

    // ─── TAP HANDLER ───
    function handleTap(clientX, clientY) {
        if (!playlist.length || !isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;

        const phase = dancePhase;
        const amp = amplitude;
        const positions = [];
        for (let idx = 0; idx < 2; idx++) {
            positions.push(getCharPosition(idx, phase, amp));
        }

        const threshold = 60;
        for (let idx = 0; idx < 2; idx++) {
            const dx = canvasX - positions[idx].x;
            const dy = canvasY - positions[idx].y;
            if (dx*dx + dy*dy < threshold * threshold) {
                const state = charStates[idx];
                if (state.special) return;
                const hand = Math.random() < 0.5 ? 'left' : 'right';
                const range = 80;
                state.special = true;
                state.hand = hand;
                state.timer = 0;
                state.duration = 1.2 + Math.random() * 0.8;
                state.startX = 0; state.startY = 0;
                state.targetX = (Math.random() - 0.5) * range * 2;
                state.targetY = (Math.random() - 0.5) * range * 1.5 - 30;
                state.progress = 0;
                break;
            }
        }
    }

    canvas.addEventListener('click', (e) => { handleTap(e.clientX, e.clientY); });
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        handleTap(t.clientX, t.clientY);
    }, { passive: false });

    // ─── ANIMATION LOOP ───
    let lastTime = 0;
    function animate(time) {
        const delta = lastTime ? (time - lastTime) / 1000 : 0.016;
        lastTime = time;

        const raw = getAmp();
        amplitude += (raw - amplitude) * 0.15;
        const bpm = 100 + amplitude * 40;
        const speed = bpm / 60;
        dancePhase += 0.016 * speed * 1.3;

        // Update special moves
        for (let idx = 0; idx < charStates.length; idx++) {
            const state = charStates[idx];
            if (state.special) {
                state.timer += delta;
                state.progress = Math.min(1, state.timer / state.duration);
                if (state.progress >= 1) {
                    state.special = false;
                    state.hand = null;
                    state.timer = 0;
                    state.progress = 0;
                }
            }
        }

        drawStage();
        animId = requestAnimationFrame(animate);
    }

    // ─── POLYFILL ───
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            return this;
        };
    }

    animate(0);

    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files.length) {
            const audio = [];
            for (const f of files) if (f.type.startsWith('audio/')) audio.push(f);
            if (audio.length) addTracks(audio);
            else alert('Drop audio files only.');
        }
    });

    window.addEventListener('resize', () => { resize(); });
    updatePlaylistUI();
    console.log('🎵 3D Duo ready! No text on canvas.');
</script>
</body>
