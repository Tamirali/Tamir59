<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tamir Ali News Studio · Seamless Seamless Character Switcher</title>
    <style>
        :root {
            --ink: #17332f;
            --paper: #fbf5e9;
            --red: #bf4d3c;
            --gold: #e9b949;
            --green: #3f7568;
            --white: #fffdf7;
            --record-red: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: var(--ink);
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a1f1b;
        }
        button, input { font: inherit; }
        button { cursor: pointer; border: none; outline: none; }

        .shell {
            width: 100%;
            max-width: 520px;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--paper);
            box-shadow: 0 24px 70px rgba(0,0,0,0.5);
        }

        .stage {
            position: relative;
            padding: 16px;
            color: var(--white);
            background: linear-gradient(180deg, rgba(13, 38, 34, 0.2), rgba(13, 38, 34, 0.8)), var(--green);
            border-bottom: 4px solid var(--gold);
        }
        .stage-mark { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .stage-mark h1 { font-size: 0.9rem; color: #f5cf70; text-transform: uppercase; }
        
        .rec-btn-top {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 99px; font-weight: 700; font-size: 0.75rem;
            color: #fff; background: var(--red);
        }
        .rec-btn-top.recording { background: var(--record-red); animation: pulse-rec 1s infinite; }
        .rec-btn-top.paused { background: #d35400; animation: none; }
        @keyframes pulse-rec { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .portrait-wrap {
            position: relative;
            width: 240px; margin: 10px auto 0;
            border-radius: 16px; overflow: hidden;
        }
        .portrait-wrap img {
            display: block; width: 100%; height: auto;
            aspect-ratio: 380 / 470; object-fit: cover;
        }
        .mouth-overlay {
            position: absolute;
            left: 50%; bottom: calc(18% + 38px);
            width: 28%; height: 9%;
            transform: translateX(-50%); pointer-events: none;
        }
        .mouth-overlay svg { width: 100%; height: 100%; display: block; }
        #mouthOpenOverlay { opacity: 0; }
        #mouthClosedOverlay { opacity: 1; }

        .panel { flex: 1; display: flex; flex-direction: column; padding: 14px; gap: 10px; }
        .upload-zone {
            border: 1.5px dashed #9a8d79; padding: 10px; text-align: center;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem; background: #fdfaf3; font-weight: 600;
        }

        .action-grid { display: flex; gap: 8px; }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; color: #fff;
        }
        .btn-play { background: var(--green); }
        .btn-stop { background: #8f332a; }

        .workflow-hint {
            background: #f0ebe0; border-radius: 8px; padding: 8px 12px;
            font-size: 0.68rem; color: #3d4f49; border-left: 3px solid var(--gold);
        }
        .hidden-canvas { position: absolute; top: -9999px; left: -9999px; width: 380px; height: 470px; opacity: 0; }
        
        .toast-msg {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 10px 20px;
            border-radius: 40px; font-size: 0.85rem; z-index: 999; text-align: center;
        }
    </style>
</head>
<body>

    <main class="shell">
        <section class="stage" id="stageArea">
            <header class="stage-mark">
                <h1>📰 तामीर अली गैप-फ्री न्यूज़ Studio</h1>
                <button class="rec-btn-top" id="recBtnTop">
                    <span id="recBtnLabel">🎥 Start Studio Rec</span>
                </button>
            </header>

            <div class="portrait-wrap" id="portraitWrap">
                <img id="faceImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 380 470'%3E%3Crect width='380' height='470' fill='%231b2a26'/%3E%3Ccircle cx='190' cy='180' r='70' fill='%233a5a52'/%3E%3Ctext x='190' y='310' font-family='system-ui' font-size='24' fill='%239aa8a2' text-anchor='middle'%3EUpload Avatar%3C/text%3E%3C/svg%3E" alt="Face" />
                <div class="mouth-overlay" id="mouthOverlay">
                    <svg viewBox="0 0 120 60">
                        <path id="mouthClosedOverlay" d="M10 32 Q60 28 110 32 M12 32 Q60 35 108 32" fill="none" stroke="#803328" stroke-width="6" stroke-linecap="round" />
                        <g id="mouthOpenOverlay">
                            <ellipse cx="60" cy="36" rx="46" ry="20" fill="#42130e" />
                            <path d="M22 28 Q60 30 98 28 Q60 24 22 28Z" fill="#ffffff" />
                            <path d="M28 44 Q60 38 92 44 Q60 50 28 44Z" fill="#c95b53" />
                        </g>
                    </svg>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="workflow-hint">
                ✂️ <b>बिना गैप का वीडियो कैसे बनाएं:</b><br>
                1. <b>🎥 Start Studio Rec</b> दबाएं और ऑडियो प्ले करें।<br>
                2. जब पहला कैरेक्टर बोल ले, <b>⏸ Pause Recording</b> दबाएं (कैमरा पॉज़ हो जाएगा)।<br>
                3. नया <b>Avatar चुनें</b>।<br>
                4. <b>▶ Resume Recording</b> दबाएं! बीच की कोई देरी रिकॉर्ड नहीं होगी।
            </div>

            <label class="upload-zone">
                🎵 ऑडियो चुनिए (MP3/WAV)
                <input type="file" id="audioInput" accept="audio/*" hidden />
            </label>

            <label class="upload-zone" style="border-color:#3f7568; background:#eef6f4;">
                👤 Avatar बदलें (Pause टाइम में अपलोड करें)
                <input type="file" id="faceInput" accept="image/*" hidden />
            </label>

            <div class="action-grid">
                <button class="action-btn btn-play" id="playAudioBtn">▶ Play Audio</button>
                <button class="action-btn btn-stop" id="stopStudioBtn" style="display:none;">⏹ Save Video</button>
            </div>
            <div id="audioProgress" style="font-size:0.75rem; text-align:center; font-weight:bold;">⏱️ Audio: 0.0s</div>
        </section>

        <canvas id="recordCanvas" class="hidden-canvas" width="380" height="470"></canvas>
    </main>

    <script>
        (function() {
            'use strict';

            const faceInput = document.getElementById('faceInput');
            const faceImage = document.getElementById('faceImage');
            const audioInput = document.getElementById('audioInput');
            const mouthOverlay = document.getElementById('mouthOverlay');
            const mouthOpen = document.getElementById('mouthOpenOverlay');
            const mouthClosed = document.getElementById('mouthClosedOverlay');
            const portraitWrap = document.getElementById('portraitWrap');
            const stageArea = document.getElementById('stageArea');
            const recBtnTop = document.getElementById('recBtnTop');
            const recBtnLabel = document.getElementById('recBtnLabel');
            const playAudioBtn = document.getElementById('playAudioBtn');
            const stopStudioBtn = document.getElementById('stopStudioBtn');
            const recordCanvas = document.getElementById('recordCanvas');
            const audioProgress = document.getElementById('audioProgress');

            const audioElement = new Audio();
            let audioContext, analyserNode, sourceNode, audioDestinationNode;
            
            let isRecording = false;
            let mediaRecorder, videoChunks = [];
            let animFrame, drawInterval;

            const canvasFaceImage = new Image();
            canvasFaceImage.crossOrigin = "anonymous";
            canvasFaceImage.src = faceImage.src;

            faceInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const uri = ev.target.result;
                        faceImage.src = uri;
                        canvasFaceImage.src = uri;
                        canvasFaceImage.onload = () => {
                            drawStageToCanvas();
                            showToast('🎭 नया कैरेक्टर सेट हो गया!', 'success');
                        };
                    };
                    reader.readAsDataURL(file);
                }
            });

            audioInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    audioElement.src = URL.createObjectURL(file);
                    audioElement.load();
                    showToast('🎵 ऑडियो लोड हो गया!', 'success');
                }
            });

            audioElement.addEventListener('timeupdate', () => {
                audioProgress.textContent = `⏱️ Audio: ${audioElement.currentTime.toFixed(1)}s / ${(audioElement.duration || 0).toFixed(1)}s`;
            });

            function setupAudioNodes() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyserNode = audioContext.createAnalyser();
                    analyserNode.fftSize = 256;
                    sourceNode = audioContext.createMediaElementSource(audioElement);
                    audioDestinationNode = audioContext.createMediaStreamDestination();

                    sourceNode.connect(analyserNode);
                    sourceNode.connect(audioContext.destination);
                    sourceNode.connect(audioDestinationNode);
                }
            }

            function animateMouth() {
                if (audioElement.paused || audioElement.ended) {
                    mouthOpen.style.opacity = 0;
                    mouthClosed.style.opacity = 1;
                    portraitWrap.style.transform = 'scale(1)';
                    return;
                }
                const samples = new Uint8Array(analyserNode.fftSize);
                analyserNode.getByteTimeDomainData(samples);
                let energy = 0;
                for (const s of samples) {
                    const norm = (s - 128) / 128;
                    energy += norm * norm;
                }
                const rms = Math.sqrt(energy / samples.length);
                const open = Math.min(1, Math.max(0, (rms - 0.01) * 8));
                
                mouthOpen.style.opacity = open;
                mouthClosed.style.opacity = 1 - open;
                portraitWrap.style.transform = `scale(${1 + open * 0.02})`;
                animFrame = requestAnimationFrame(animateMouth);
            }

            playAudioBtn.addEventListener('click', async () => {
                if (!audioElement.src) {
                    showToast('⚠️ पहले ऑडियो अपलोड करें!', 'error');
                    return;
                }
                setupAudioNodes();
                if (audioContext.state === 'suspended') await audioContext.resume();

                if (audioElement.paused) {
                    audioElement.play();
                    playAudioBtn.textContent = '⏸ Pause Audio';
                    animateMouth();
                } else {
                    audioElement.pause();
                    playAudioBtn.textContent = '▶ Resume Audio';
                }
            });

            // Canvas Drawing
            const ctx = recordCanvas.getContext('2d');
            function drawStageToCanvas() {
                const w = 380, h = 470;
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = '#1f3f38'; ctx.fillRect(0, 0, w, h);

                const stageRect = stageArea.getBoundingClientRect();
                const wrapRect = portraitWrap.getBoundingClientRect();
                const mouthRect = mouthOverlay.getBoundingClientRect();

                const wrapX = (wrapRect.left - stageRect.left) / stageRect.width * w;
                const wrapY = (wrapRect.top - stageRect.top) / stageRect.height * h;
                const wrapW = wrapRect.width / stageRect.width * w;
                const wrapH = wrapRect.height / stageRect.height * h;

                const img = canvasFaceImage;
                if (img.complete && img.naturalWidth > 0) {
                    ctx.save(); ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(wrapX, wrapY, wrapW, wrapH, 16);
                    else ctx.rect(wrapX, wrapY, wrapW, wrapH);
                    ctx.clip(); ctx.drawImage(img, wrapX, wrapY, wrapW, wrapH); ctx.restore();
                }

                const mouthXCenter = ((mouthRect.left + mouthRect.width / 2) - stageRect.left) / stageRect.width * w;
                const mouthYCenter = ((mouthRect.top + mouthRect.height / 2) - stageRect.top) / stageRect.height * h;
                const mouthW = (mouthRect.width / stageRect.width) * w;
                const mouthH = (mouthRect.height / stageRect.height) * h;

                ctx.strokeStyle = '#803328'; ctx.lineWidth = 5; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(mouthXCenter - mouthW*0.4, mouthYCenter - 4);
                ctx.quadraticCurveTo(mouthXCenter, mouthYCenter - 10, mouthXCenter + mouthW*0.4, mouthYCenter - 4);
                ctx.stroke();

                const openVal = parseFloat(mouthOpen.style.opacity) || 0;
                if (openVal > 0.05) {
                    ctx.save();
                    ctx.globalAlpha = Math.min(openVal, 1);
                    ctx.fillStyle = '#42130e';
                    ctx.beginPath(); ctx.ellipse(mouthXCenter, mouthYCenter + 2, mouthW*0.45, mouthH*0.45, 0, 0, 2*Math.PI); ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.ellipse(mouthXCenter, mouthYCenter - 2, mouthW*0.32, mouthH*0.18, 0, 0, 2*Math.PI); ctx.fill();
                    ctx.restore();
                }

                ctx.fillStyle = 'rgba(191,77,60,0.95)'; ctx.fillRect(0, h - 28, w, 28);
                ctx.fillStyle = '#e9b949'; ctx.font = 'bold 10px system-ui'; ctx.fillText('BREAKING NEWS  |  तामीर अली विस्फोटक न्यूज़', 10, h - 8);
            }

            // STUDIO RECORDING CONTROL (With Native Pause / Resume)
            recBtnTop.addEventListener('click', async () => {
                setupAudioNodes();
                if (audioContext.state === 'suspended') await audioContext.resume();

                if (!isRecording) {
                    // START
                    drawInterval = setInterval(drawStageToCanvas, 33);
                    const canvasStream = recordCanvas.captureStream(30);
                    const tracks = [canvasStream.getVideoTracks()[0]];

                    if (audioDestinationNode && audioDestinationNode.stream.getAudioTracks().length > 0) {
                        tracks.push(audioDestinationNode.stream.getAudioTracks()[0]);
                    }

                    const combinedStream = new MediaStream(tracks);
                    let mimeType = 'video/webm;codecs=vp9,opus';
                    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

                    mediaRecorder = new MediaRecorder(combinedStream, { mimeType });
                    videoChunks = [];

                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) videoChunks.push(e.data); };

                    mediaRecorder.onstop = () => {
                        const finalBlob = new Blob(videoChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(finalBlob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'TamirAli_Seamless_News_' + Date.now() + '.webm';
                        a.click();
                        setTimeout(() => URL.revokeObjectURL(url), 5000);
                        showToast('💾 परफेक्ट बिना-गैप वाला वीडियो डाउनलोड हो गया!', 'success');
                    };

                    mediaRecorder.start(100);
                    isRecording = true;
                    recBtnLabel.textContent = '⏸ Pause Rec (To Change Avatar)';
                    recBtnTop.classList.add('recording');
                    stopStudioBtn.style.display = 'block';
                    showToast('🔴 रिकॉर्डिंग चालू!', 'info');
                } else if (mediaRecorder.state === 'recording') {
                    // PAUSE
                    mediaRecorder.pause();
                    audioElement.pause();
                    playAudioBtn.textContent = '▶ Play Audio';
                    recBtnLabel.textContent = '▶ Resume Rec';
                    recBtnTop.classList.remove('recording');
                    recBtnTop.classList.add('paused');
                    showToast('⏸️ रिकॉर्डिंग पॉज़्ड! अब आराम से नया Avatar अपलोड करें।', 'info');
                } else if (mediaRecorder.state === 'paused') {
                    // RESUME
                    mediaRecorder.resume();
                    recBtnLabel.textContent = '⏸ Pause Rec (To Change Avatar)';
                    recBtnTop.classList.remove('paused');
                    recBtnTop.classList.add('recording');
                    showToast('🔴 रिकॉर्डिंग फिर शुरू!', 'info');
                }
            });

            stopStudioBtn.addEventListener('click', () => {
                if (mediaRecorder && isRecording) {
                    audioElement.pause();
                    mediaRecorder.stop();
                    isRecording = false;
                    recBtnLabel.textContent = '🎥 Start Studio Rec';
                    recBtnTop.classList.remove('recording', 'paused');
                    stopStudioBtn.style.display = 'none';
                    clearInterval(drawInterval);
                }
            });

            function showToast(msg, type = 'info') {
                const existing = document.querySelector('.toast-msg'); if (existing) existing.remove();
                const div = document.createElement('div'); div.className = 'toast-msg'; div.textContent = msg;
                document.body.appendChild(div);
                setTimeout(() => { div.remove(); }, 3000);
            }

            drawStageToCanvas();
        })();
    </script>
</body>
</html>
