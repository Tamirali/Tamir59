<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>महासंग्रह — AI आर्ट जेनरेटर</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-color: #f8fafc;
      --text-dim: #94a3b8;
      --border-color: #334155;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .studio-shell {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text-color);
      text-decoration: none;
    }

    .brand span { color: var(--accent-color); }

    .studio-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .field textarea {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 12px;
      border-radius: 8px;
      outline: none;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
    }

    .field textarea:focus {
      border-color: var(--accent-color);
    }

    .generate-button {
      width: 100%;
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: background 0.3s;
    }

    .generate-button:hover {
      background-color: var(--accent-hover);
    }

    .generate-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-panel {
      margin-top: 15px;
      background: var(--bg-color);
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    .image-stage {
      margin-top: 20px;
      width: 100%;
      min-height: 350px;
      background-color: var(--bg-color);
      border: 2px dashed var(--border-color);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .image-stage img {
      width: 100%;
      height: 100%;
      max-height: 450px;
      object-fit: contain;
    }

    .output-actions {
      display: flex;
      gap: 15px;
      margin-top: 15px;
    }

    .btn-action {
      flex: 1;
      text-align: center;
      padding: 12px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-action.disabled {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>

<main class="studio-shell">
  <header>
    <a href="#" class="brand">महासंग्रह <span>AI</span></a>
    <div>अक्ल की जीत · टेक्स्ट टू आर्ट</div>
  </header>

  <section class="studio-card">
    <h2>अपनी सोच को चित्र में बदलें</h2>
    
    <div class="field-group">
      <!-- Prompt Textarea -->
      <div class="field">
        <label><i class="fa-solid fa-wand-magic-sparkles"></i> विवरण (Prompt) लिखें</label>
        <textarea id="promptInput" placeholder="जैसे: A futuristic city in deep space with golden light and stars, 8k resolution, photorealistic"></textarea>
      </div>
    </div>

    <!-- Submit Button -->
    <button class="generate-button" id="generateBtn" onclick="generateImage()">
      <i class="fa-solid fa-image"></i> AI चित्र बनाएँ
    </button>

    <!-- Status Output -->
    <div class="status-panel">
      <span id="statusText">विवरण दर्ज करें और 'AI चित्र बनाएँ' पर क्लिक करें।</span>
      <span id="statusPercent">0%</span>
    </div>
  </section>

  <!-- Output Result Section -->
  <section class="studio-card">
    <h2>परिणाम / Image Output</h2>
    <div class="image-stage" id="imageStage">
      <p id="placeholderText" style="color: var(--text-dim);"><i class="fa-solid fa-file-image"></i> आपका AI चित्र यहाँ दिखेगा</p>
    </div>

    <div class="output-actions">
      <a id="downloadBtn" class="btn-action disabled" download="ai-generated-art.png" target="_blank">
        <i class="fa-solid fa-download"></i> चित्र डाउनलोड करें
      </a>
    </div>
  </section>
</main>

<script>
  async function generateImage() {
    const promptText = document.getElementById('promptInput').value.trim();
    const statusText = document.getElementById('statusText');
    const statusPercent = document.getElementById('statusPercent');
    const generateBtn = document.getElementById('generateBtn');
    const imageStage = document.getElementById('imageStage');
    const downloadBtn = document.getElementById('downloadBtn');

    if (!promptText) {
      alert("कृपया चित्र बनाने के लिए कुछ विवरण (Prompt) लिखें!");
      return;
    }

    generateBtn.disabled = true;
    statusText.innerText = "AI चित्र तैयार कर रहा है (10-15 सेकंड)...";
    statusPercent.innerText = "50%";

    try {
      // Free Hugging Face AI Model Endpoint (Stable Diffusion XL)
      const response = await fetch(
        "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0",
        {
          headers: {
            "Content-Type": "application/json",
          },
          method: "POST",
          body: JSON.stringify({ inputs: promptText }),
        }
      );

      if (!response.ok) {
        throw new Error("API से रिस्पॉन्स प्राप्त करने में असफलता हुई।");
      }

      // Convert result to Blob Image
      const blob = await response.blob();
      const imageUrl = URL.createObjectURL(blob);

      // Render Image
      imageStage.innerHTML = `<img src="${imageUrl}" alt="AI Generated Image" />`;
      
      // Setup Download Link
      downloadBtn.href = imageUrl;
      downloadBtn.classList.remove('disabled');

      statusText.innerText = "चित्र सफलतापूर्वक बन गया!";
      statusPercent.innerText = "100%";

    } catch (error) {
      console.error(error);
      statusText.innerText = "त्रुटि: सर्वर बिज़ी है या चित्र नहीं बन सका।";
      statusPercent.innerText = "ERR";
    } finally {
      generateBtn.disabled = false;
    }
  }
</script>

</body>
</html>
