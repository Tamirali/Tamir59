<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>महासंग्रह — AI टॉकिंग अवतार (Replicate API)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-color: #f8fafc;
      --text-dim: #94a3b8;
      --border-color: #334155;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .studio-shell {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text-color);
      text-decoration: none;
    }

    .brand span { color: var(--accent-color); }

    .studio-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .field input {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 12px;
      border-radius: 8px;
      outline: none;
      font-size: 0.95rem;
    }

    .field input:focus {
      border-color: var(--accent-color);
    }

    .generate-button {
      width: 100%;
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: background 0.3s;
    }

    .generate-button:hover {
      background-color: var(--accent-hover);
    }

    .generate-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-panel {
      margin-top: 15px;
      background: var(--bg-color);
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    .video-stage {
      margin-top: 20px;
      width: 100%;
      min-height: 300px;
      background-color: var(--bg-color);
      border: 2px dashed var(--border-color);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .video-stage video {
      width: 100%;
      height: 100%;
      max-height: 450px;
      object-fit: contain;
    }

    .output-actions {
      display: flex;
      gap: 15px;
      margin-top: 15px;
    }

    .btn-action {
      flex: 1;
      text-align: center;
      padding: 12px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-action.disabled {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>

<main class="studio-shell">
  <header>
    <a href="#" class="brand">महासंग्रह <span>AI</span></a>
    <div>अक्ल की जीत · संस्करण 01</div>
  </header>

  <section class="studio-card">
    <h2>अपना अवतार तैयार करें</h2>
    
    <div class="field-group">
      <!-- Photo URL Field -->
      <div class="field">
        <label><i class="fa-solid fa-image"></i> फोटो का वेब लिंक (Image URL)</label>
        <input type="url" id="photoUrl" value="https://i.ibb.co/bgNLBsm3/compressed-photo-1.jpg" placeholder="https://example.com/photo.jpg">
      </div>

      <!-- Audio URL Field -->
      <div class="field">
        <label><i class="fa-solid fa-file-audio"></i> ऑडियो का वेब लिंक (Audio URL)</label>
        <input type="url" id="audioUrl" value="https://files.catbox.moe/5t4zxv.mp3" placeholder="https://example.com/voice.mp3">
      </div>
    </div>

    <!-- Submit Button -->
    <button class="generate-button" id="generateBtn" onclick="generateAvatar()">
      <i class="fa-solid fa-wand-magic-sparkles"></i> अवतार तैयार करें
    </button>

    <!-- Status Output -->
    <div class="status-panel">
      <span id="statusText">लिंक तैयार हैं — अब अपनी कहानी को चेहरा दें।</span>
      <span id="statusPercent">0%</span>
    </div>
  </section>

  <!-- Output Result Section -->
  <section class="studio-card">
    <h2>परिणाम / Video Output</h2>
    <div class="video-stage" id="videoStage">
      <p id="placeholderText" style="color: var(--text-dim);"><i class="fa-solid fa-play"></i> वीडियो तैयार होने पर यहाँ दिखेगा</p>
    </div>

    <div class="output-actions">
      <a id="downloadBtn" class="btn-action disabled" download="avatar-video.mp4" target="_blank">
        <i class="fa-solid fa-download"></i> वीडियो डाउनलोड करें
      </a>
    </div>
  </section>
</main>

<script>
  // Replicate API Key Integrated Directly
  const REPLICATE_API_KEY = "R8_QapnZvEWAfRK3AiOMuPxnAVWixl4jTp16bMKt";

  async function generateAvatar() {
    const photoUrl = document.getElementById('photoUrl').value.trim();
    const audioUrl = document.getElementById('audioUrl').value.trim();

    const statusText = document.getElementById('statusText');
    const statusPercent = document.getElementById('statusPercent');
    const generateBtn = document.getElementById('generateBtn');

    if (!photoUrl || !audioUrl) {
      alert("कृपया फोटो और ऑडियो दोनों के लिंक दर्ज करें!");
      return;
    }

    generateBtn.disabled = true;
    statusText.innerText = "Replicate AI से कनेक्शन स्थापित हो रहा है...";
    statusPercent.innerText = "15%";

    try {
      // Create Prediction on Replicate
      const response = await fetch('https://api.replicate.com/v1/predictions', {
        method: 'POST',
        headers: {
          'Authorization': `Token ${REPLICATE_API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          // SadTalker model on Replicate
          version: "28e0856096531398188168234390f701c640e7025be452380775d7eef84ff216",
          input: {
            source_image: photoUrl,
            driven_audio: audioUrl
          }
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || data.error || 'API रिक्वेस्ट में समस्या आई है।');
      }

      const predictionId = data.id;
      statusText.innerText = "AI मॉडल प्रोसेस हो रहा है...";
      statusPercent.innerText = "40%";

      // Poll Status
      checkReplicateStatus(predictionId);

    } catch (error) {
      console.error(error);
      statusText.innerText = "त्रुटि: " + error.message;
      statusPercent.innerText = "ERR";
      generateBtn.disabled = false;
    }
  }

  async function checkReplicateStatus(predictionId) {
    const statusText = document.getElementById('statusText');
    const statusPercent = document.getElementById('statusPercent');
    const videoStage = document.getElementById('videoStage');
    const downloadBtn = document.getElementById('downloadBtn');
    const generateBtn = document.getElementById('generateBtn');

    const interval = setInterval(async () => {
      try {
        const res = await fetch(`https://api.replicate.com/v1/predictions/${predictionId}`, {
          method: 'GET',
          headers: {
            'Authorization': `Token ${REPLICATE_API_KEY}`
          }
        });

        const result = await res.json();

        if (result.status === 'succeeded') {
          clearInterval(interval);
          statusText.innerText = "अवतार सफलतापूर्वक बन गया!";
          statusPercent.innerText = "100%";

          const videoUrl = Array.isArray(result.output) ? result.output[0] : result.output;

          // Display Generated Video
          videoStage.innerHTML = `<video controls autoplay src="${videoUrl}"></video>`;
          
          // Enable Download Link
          downloadBtn.href = videoUrl;
          downloadBtn.classList.remove('disabled');

          generateBtn.disabled = false;
        } else if (result.status === 'failed' || result.status === 'canceled') {
          clearInterval(interval);
          statusText.innerText = "वीडियो बनाने में त्रुटि हुई या प्रोसेस रद्द हो गया।";
          statusPercent.innerText = "ERR";
          generateBtn.disabled = false;
        } else {
          statusText.innerText = "रेंडरिंग चालू है (प्रोसेसिंग...)...";
          statusPercent.innerText = "75%";
        }
      } catch (err) {
        clearInterval(interval);
        statusText.innerText = "स्टेटस जांचने में समस्या आई।";
        generateBtn.disabled = false;
      }
    }, 4000); // Check every 4 seconds
  }
</script>

</body>
</html>
