<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎭 4-अवतार डिजिटल थिएटर</title>
    <!-- React + ReactDOM from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js">
    </script>
    <style>
        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0e14;
            color: #eef2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
            background: #141a24;
            border-radius: 32px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            padding: 28px 32px 32px;
            border: 1px solid #2a3344;
        }

        /* ===== Header ===== */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid #1f293d;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(145deg, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-header h1 span {
            background: #2a3344;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            -webkit-text-fill-color: #aab;
            background: #1e2738;
        }

        .app-header p {
            color: #8e9bb5;
            font-size: 16px;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* ===== Workspace ===== */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* ===== Stage ===== */
        .stage {
            background: #0f1520;
            border-radius: 24px;
            padding: 30px 20px;
            border: 4px solid #4A90E2;
            transition: border-color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            position: relative;
            overflow: hidden;
        }

        .stage::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.03), transparent 70%);
            pointer-events: none;
        }

        .avatar-graphic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            transition: all 0.4s ease;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        .avatar-graphic .avatar-icon {
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
        }

        .stage h3 {
            margin-top: 18px;
            font-size: 22px;
            font-weight: 600;
            color: #eef2f7;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 2;
        }

        .stage .subtitle {
            font-size: 14px;
            color: #8e9bb5;
            margin-top: 4px;
            z-index: 2;
        }

        /* ===== Control Panel ===== */
        .control-panel {
            background: #0f1520;
            border-radius: 24px;
            padding: 24px 26px;
            border: 1px solid #1f293d;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .control-panel h3 {
            font-size: 15px;
            font-weight: 600;
            color: #9aabca;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .avatar-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .avatar-btn {
            background: #1a2332;
            border: 2px solid transparent;
            color: #c8d0e0;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 auto;
            min-width: 100px;
            justify-content: center;
        }

        .avatar-btn:hover {
            background: #2a3344;
            transform: translateY(-2px);
        }

        .avatar-btn.active {
            border-color: #fc5c7d;
            background: #2a1f2e;
            color: #fff;
            box-shadow: 0 0 24px rgba(252, 92, 125, 0.15);
        }

        .expression-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .expression-selector button {
            background: #1a2332;
            border: 2px solid transparent;
            color: #c8d0e0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            flex: 1 1 auto;
            min-width: 70px;
        }

        .expression-selector button:hover {
            background: #2a3344;
        }

        .expression-selector button.exp-active {
            border-color: #f0c27f;
            background: #2a241e;
            color: #f0c27f;
            box-shadow: 0 0 20px rgba(240, 194, 127, 0.1);
        }

        .dialogue-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dialogue-box input {
            flex: 1;
            min-width: 180px;
            padding: 12px 18px;
            border-radius: 40px;
            border: 2px solid #1f293d;
            background: #0b0e14;
            color: #eef2f7;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
        }

        .dialogue-box input:focus {
            border-color: #fc5c7d;
            box-shadow: 0 0 20px rgba(252, 92, 125, 0.08);
        }

        .dialogue-box input::placeholder {
            color: #4a5670;
        }

        .dialogue-box button {
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(145deg, #fc5c7d, #f0c27f);
            color: #0b0e14;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .dialogue-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(252, 92, 125, 0.3);
        }

        /* ===== Story Timeline ===== */
        .story-timeline {
            grid-column: 1 / -1;
            background: #0f1520;
            border-radius: 24px;
            padding: 24px 26px;
            border: 1px solid #1f293d;
            margin-top: 4px;
        }

        .story-timeline h3 {
            font-size: 17px;
            font-weight: 600;
            color: #9aabca;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .story-timeline .empty-msg {
            color: #4a5670;
            text-align: center;
            padding: 30px 0;
            font-size: 16px;
        }

        .story-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 20px;
            background: #0b0e14;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 5px solid #4A90E2;
            transition: 0.25s;
            flex-wrap: wrap;
        }

        .story-card:hover {
            background: #141a24;
            transform: translateX(4px);
        }

        .story-card span {
            font-size: 15px;
            color: #d0d8e8;
            flex: 1;
            min-width: 200px;
        }

        .story-card span strong {
            color: #eef2f7;
        }

        .story-card span em {
            color: #8e9bb5;
            font-style: italic;
            font-size: 13px;
            margin-left: 8px;
        }

        .story-card button {
            background: #1a2332;
            border: none;
            color: #c8d0e0;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .story-card button:hover {
            background: #2a3344;
            color: #fff;
        }

        .story-card .delete-btn {
            background: transparent;
            color: #6a7a9a;
            padding: 4px 10px;
            font-size: 16px;
        }

        .story-card .delete-btn:hover {
            background: #2a1f1f;
            color: #ff6b6b;
        }

        /* ===== Clear button ===== */
        .clear-btn {
            background: transparent;
            border: 1px solid #2a3344;
            color: #6a7a9a;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 4px;
        }

        .clear-btn:hover {
            background: #2a1f1f;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .story-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .story-count {
            font-size: 13px;
            color: #4a5670;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .app-container {
                padding: 16px;
            }
            .app-header h1 {
                font-size: 20px;
            }
            .stage {
                min-height: 220px;
                padding: 20px;
            }
            .avatar-graphic {
                width: 100px;
                height: 100px;
                font-size: 52px;
            }
            .stage h3 {
                font-size: 18px;
            }
            .control-panel {
                padding: 18px;
            }
            .dialogue-box input {
                min-width: 130px;
                font-size: 14px;
            }
            .dialogue-box button {
                font-size: 14px;
                padding: 10px 20px;
            }
            .story-card {
                padding: 12px 14px;
                flex-direction: column;
                align-items: stretch;
            }
            .story-card span {
                min-width: auto;
            }
            .story-card button {
                align-self: flex-start;
            }
            .avatar-btn {
                min-width: 70px;
                font-size: 13px;
                padding: 8px 12px;
            }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f1520;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3344;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b455a;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script>
        // ================================================================
        //  🎭  4-अवतार डिजिटल थिएटर – पूरा React ऐप
        // ================================================================

        const { useState, useEffect, useRef, useCallback } = React;

        // ---------- अवतार डेटा ----------
        const AVATARS = [
            { id: 1, name: "मार्गदर्शक (Guru)", role: "ज्ञान व विवेक", icon: "🧙‍♂️", color: "#4A90E2" },
            { id: 2, name: "जिज्ञासु (Student)", role: "सत्य की खोज", icon: "👨‍🎓", color: "#50E3C2" },
            { id: 3, name: "डेवलपर (Builder)", role: "सिस्टम व निर्माण", icon: "👨‍💻", color: "#F5A623" },
            { id: 4, name: "विश्लेषक (Analyst)", role: "तर्क व परीक्षण", icon: "👨‍⚖️", color: "#E74C3C" }
        ];

        // ---------- मुख्य कंपोनेंट ----------
        function AvatarProject() {
            const [selectedAvatar, setSelectedAvatar] = useState(AVATARS[0]);
            const [expression, setExpression] = useState("शांत");
            const [dialogue, setDialogue] = useState("");
            const [storyList, setStoryList] = useState([]);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const inputRef = useRef(null);

            // ---------- आवाज़ (Speech Synthesis) ----------
            const speakText = useCallback((text, callback) => {
                if (!('speechSynthesis' in window)) {
                    alert('आपका ब्राउज़र आवाज़ समर्थन नहीं करता।');
                    if (callback) callback();
                    return;
                }

                // पहले से चल रही आवाज़ रोकें
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                utterance.rate = 0.9;
                utterance.pitch = 1.0;

                // हिंदी आवाज़ खोजें
                const voices = window.speechSynthesis.getVoices();
                const hindiVoice = voices.find(v => v.lang.startsWith('hi'));
                if (hindiVoice) utterance.voice = hindiVoice;

                setIsSpeaking(true);

                utterance.onend = () => {
                    setIsSpeaking(false);
                    if (callback) callback();
                };

                utterance.onerror = () => {
                    setIsSpeaking(false);
                    if (callback) callback();
                };

                window.speechSynthesis.speak(utterance);
            }, []);

            // ---------- संवाद बोलें और कहानी में जोड़ें ----------
            const handleSpeak = () => {
                const text = dialogue.trim();
                if (text === "") {
                    inputRef.current?.focus();
                    return;
                }

                // पहले आवाज़ निकालें, फिर कहानी में जोड़ें
                speakText(text, () => {
                    // कहानी में नया संवाद जोड़ें
                    const newEntry = {
                        id: Date.now(),
                        avatar: selectedAvatar.name,
                        icon: selectedAvatar.icon,
                        text: text,
                        expression: expression,
                        color: selectedAvatar.color,
                        timestamp: new Date().toLocaleTimeString()
                    };
                    setStoryList(prev => [...prev, newEntry]);
                    setDialogue("");
                    inputRef.current?.focus();
                });
            };

            // ---------- कहानी से हटाएँ ----------
            const removeFromStory = (id) => {
                setStoryList(prev => prev.filter(item => item.id !== id));
            };

            // ---------- सभी हटाएँ ----------
            const clearStory = () => {
                if (storyList.length === 0) return;
                if (confirm('क्या आप सभी संवाद हटाना चाहते हैं?')) {
                    setStoryList([]);
                }
            };

            // ---------- दोबारा सुनें ----------
            const replayText = (text) => {
                speakText(text);
            };

            // ---------- Enter key ----------
            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSpeak();
                }
            };

            // ---------- वॉयस लोड होने पर ----------
            useEffect(() => {
                // कुछ ब्राउज़रों में voices लोड होने में समय लगता है
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices();
                    window.speechSynthesis.onvoiceschanged = () => {
                        window.speechSynthesis.getVoices();
                    };
                }
            }, []);

            // ---------- अवतार बदलने पर ऑटो-ग्रीटिंग ----------
            const handleAvatarChange = (avatar) => {
                setSelectedAvatar(avatar);
                // ऑटो-ग्रीटिंग (बिना कहानी में जोड़े)
                const greeting = `नमस्ते! मैं ${avatar.name} हूँ।`;
                speakText(greeting);
            };

            // ---------- रेंडर ----------
            return (
                <div className="app-container">
                    {/* हेडर */}
                    <header className="app-header">
                        <h1>
                            🎭 4-अवतार डिजिटल थिएटर
                            <span>{storyList.length} संवाद</span>
                        </h1>
                        <p>🧠 विवेक और अक्ल की जीत — आवाज़ और कहानी का मंच</p>
                    </header>

                    {/* वर्कस्पेस */}
                    <div className="workspace">
                        {/* स्टेज */}
                        <div className="stage" style={{ borderColor: selectedAvatar.color }}>
                            <div className="avatar-graphic" style={{ backgroundColor: selectedAvatar.color }}>
                                <span className="avatar-icon">{selectedAvatar.icon}</span>
                            </div>
                            <h3 style={{ color: selectedAvatar.color }}>
                                {selectedAvatar.name}
                            </h3>
                            <div className="subtitle">
                                {selectedAvatar.role} · भाव: {expression}
                                {isSpeaking && <span style={{ marginLeft: 10 }}>🔊 बोल रहा…</span>}
                            </div>
                        </div>

                        {/* कंट्रोल पैनल */}
                        <div className="control-panel">
                            <div>
                                <h3>1. 🧑‍🎤 अवतार चुनें</h3>
                                <div className="avatar-selector">
                                    {AVATARS.map((avatar) => (
                                        <button
                                            key={avatar.id}
                                            className={`avatar-btn ${selectedAvatar.id === avatar.id ? 'active' : ''}`}
                                            onClick={() => handleAvatarChange(avatar)}
                                            style={{
                                                borderColor: selectedAvatar.id === avatar.id ? avatar.color : 'transparent'
                                            }}
                                        >
                                            {avatar.icon} {avatar.name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <h3>2. 🎭 भाव / अभिव्यक्ति</h3>
                                <div className="expression-selector">
                                    {["शांत", "विचारशील", "उत्साही", "गंभीर"].map((exp) => (
                                        <button
                                            key={exp}
                                            onClick={() => setExpression(exp)}
                                            className={expression === exp ? 'exp-active' : ''}
                                        >
                                            {exp === "शांत" && "😌"}
                                            {exp === "विचारशील" && "🤔"}
                                            {exp === "उत्साही" && "😄"}
                                            {exp === "गंभीर" && "😐"} {exp}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <h3>3. 🗣️ संवाद बोलें और जोड़ें</h3>
                                <div className="dialogue-box">
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        placeholder="यहाँ डायलॉग लिखें..."
                                        value={dialogue}
                                        onChange={(e) => setDialogue(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        disabled={isSpeaking}
                                    />
                                    <button onClick={handleSpeak} disabled={isSpeaking}>
                                        {isSpeaking ? '⏳ बोल रहा…' : '🔊 बोलें और जोड़ें'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* कहानी टाइमलाइन */}
                    <div className="story-timeline">
                        <div className="story-header">
                            <h3>
                                📜 आपकी कहानी (Script)
                                <span className="story-count">{storyList.length} संवाद</span>
                            </h3>
                            {storyList.length > 0 && (
                                <button className="clear-btn" onClick={clearStory}>
                                    🗑️ सभी हटाएँ
                                </button>
                            )}
                        </div>

                        {storyList.length === 0 ? (
                            <div className="empty-msg">
                                🎬 अभी कोई संवाद नहीं। ऊपर डायलॉग लिखकर "बोलें और जोड़ें" दबाएँ।
                            </div>
                        ) : (
                            storyList.map((item) => (
                                <div key={item.id} className="story-card" style={{ borderLeftColor: item.color }}>
                                    <span>
                                        {item.icon} <strong>{item.avatar}:</strong> "{item.text}"
                                        <em>({item.expression})</em>
                                        <span style={{ fontSize: '11px', color: '#4a5670', marginLeft: 10 }}>
                                            {item.timestamp}
                                        </span>
                                    </span>
                                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                        <button onClick={() => replayText(item.text)}>
                                            ▶ सुनें
                                        </button>
                                        <button className="delete-btn" onClick={() => removeFromStory(item.id)}>
                                            ✕
                                        </button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // ================================================================
        //  React DOM माउंट
        // ================================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AvatarProject />);
    </script>

</body>
</html>
