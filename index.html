<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Universe News - Firebase Powered</title>
    
    <!-- Firebase Compat SDKs for Web -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <style>
        :root {
            --ink: #17332f;
            --paper: #fbf5e9;
            --red: #bf4d3c;
            --gold: #e9b949;
            --green: #3f7568;
            --white: #fffdf7;
            --record-red: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--ink);
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a1f1b;
        }

        .shell {
            width: 100%;
            max-width: 480px;
            background: var(--paper);
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* ─── LIVE RECORDING INDICATOR LINE ─── */
        .rec-progress-container {
            width: 100%;
            height: 8px;
            background: #dcd6c8;
            position: relative;
            overflow: hidden;
        }

        .rec-progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f39c12, var(--record-red));
            transition: width 0.3s linear;
        }

        /* ─── CANVAS STAGE ─── */
        .stage-box {
            position: relative;
            width: 100%;
            background: var(--green);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid var(--gold);
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
            background: #122c26;
        }

        /* ─── PANEL CONTROLS ─── */
        .panel { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        
        .box {
            padding: 10px;
            border: 1px solid rgba(23, 51, 47, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.6);
        }

        .slider-group { display: flex; gap: 8px; margin-top: 6px; }
        .slider-item { flex: 1; font-size: 0.7rem; font-weight: bold; }
        .slider-item input { width: 100%; }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            background: var(--green);
            font-size: 0.9rem;
            text-align: center;
        }

        .btn-red { background: var(--red); }
        .btn-pause { background: #f39c12; }
        .btn-admin { background: #2c3e50; margin-top: 5px; }
        
        .rec-controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .upload-zone {
            border: 1.5px dashed #9a8d79;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .status-badge {
            font-size: 0.8rem;
            text-align: center;
            font-weight: bold;
            color: var(--red);
        }

        /* ─── ADMIN MODAL ─── */
        .admin-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper);
            z-index: 100;
            padding: 16px;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 8px;
        }

        .video-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-card video { width: 100%; border-radius: 6px; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <main class="shell">
        
        <!-- 🔴 RECORDING PROGRESS BAR -->
        <div class="rec-progress-container">
            <div class="rec-progress-fill" id="progressFill"></div>
        </div>

        <!-- CANVAS MAIN SCREEN -->
        <section class="stage-box">
            <canvas id="newsCanvas" width="400" height="480"></canvas>
        </section>

        <!-- PANEL CONTROLS -->
        <section class="panel">
            
            <div class="status-badge" id="statusBadge">READY TO RECORD</div>

            <!-- UPLOADS -->
            <label class="upload-zone">📷 चेहरा बदलें <input type="file" id="faceInput" accept="image/*" hidden /></label>
            <label class="upload-zone">🎵 ऑडियो अपलोड करें <input type="file" id="audioInput" accept="audio/*" hidden /></label>

            <!-- LIP POSITION ADJUSTMENT -->
            <div class="box">
                <span style="font-size:0.8rem; font-weight:bold;">🎯 होठों की स्थिति एडजस्ट करें</span>
                <div class="slider-group">
                    <div class="slider-item">L/R <input type="range" id="lipX" min="-60" max="60" value="0" /></div>
                    <div class="slider-item">U/D <input type="range" id="lipY" min="-60" max="60" value="0" /></div>
                    <div class="slider-item">Size <input type="range" id="lipScale" min="50" max="150" value="100" /></div>
                </div>
            </div>

            <!-- AUDIO CONTROLS -->
            <button class="btn" id="playBtn">▶ Play Audio & Lip-Sync</button>

            <!-- RECORDING CONTROLS -->
            <div class="rec-controls-grid">
                <button class="btn btn-red" id="startStopRecBtn">🔴 Start Record</button>
                <button class="btn btn-pause" id="pauseResumeRecBtn" disabled>⏸ Pause</button>
            </div>

            <!-- ADMIN PANEL ACCESS -->
            <button class="btn btn-admin" id="openAdminBtn">🔐 Admin Portal</button>

        </section>

        <!-- 🔐 ADMIN MODAL -->
        <div class="admin-modal" id="adminModal">
            <div class="admin-header">
                <h3>👑 Universe News Admin Portal</h3>
                <button class="btn btn-red" id="exitAdminBtn" style="padding:4px 12px;">Exit</button>
            </div>
            <div id="videoListContainer" style="display:flex; flex-direction:column; gap:10px;">
                <p>Loading Videos...</p>
            </div>
        </div>

    </main>

    <script>
        // ─── FIREBASE CONFIGURATION (YOUR REAL KEYS) ───
        const firebaseConfig = {
            apiKey: "AIzaSyB5jFBBfJ1zQ7_d7nOqJpIow3AbQCGBJ7I",
            authDomain: "universe-news-d4db3.firebaseapp.com",
            databaseURL: "https://universe-news-d4db3-default-rtdb.firebaseio.com",
            projectId: "universe-news-d4db3",
            storageBucket: "universe-news-d4db3.firebasestorage.app",
            messagingSenderId: "189890842339",
            appId: "1:189890842339:web:6a92231933b73750d5bfd6",
            measurementId: "G-11GSCL6CGW"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ─── DOM ELEMENTS ───
        const canvas = document.getElementById('newsCanvas');
        const ctx = canvas.getContext('2d');
        const progressFill = document.getElementById('progressFill');
        const statusBadge = document.getElementById('statusBadge');

        const faceInput = document.getElementById('faceInput');
        const audioInput = document.getElementById('audioInput');
        const playBtn = document.getElementById('playBtn');
        const startStopRecBtn = document.getElementById('startStopRecBtn');
        const pauseResumeRecBtn = document.getElementById('pauseResumeRecBtn');

        const openAdminBtn = document.getElementById('openAdminBtn');
        const exitAdminBtn = document.getElementById('exitAdminBtn');
        const adminModal = document.getElementById('adminModal');
        const videoListContainer = document.getElementById('videoListContainer');

        const lipX = document.getElementById('lipX');
        const lipY = document.getElementById('lipY');
        const lipScale = document.getElementById('lipScale');

        let faceImg = new Image();
        faceImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 380 470'%3E%3Crect width='380' height='470' fill='%231b2a26'/%3E%3Ccircle cx='190' cy='180' r='70' fill='%233a5a52'/%3E%3C/svg%3E";

        let tickerX = canvas.width;
        let lipOpenAmount = 0;

        let audioCtx, audioBuffer, sourceNode, analyserNode, audioDest;
        let isPlaying = false, isRecording = false, isPaused = false;
        let mediaRecorder, recordedChunks = [];
        let recTimerInterval, recSeconds = 0;

        // 1. Render Canvas Frame Loop
        function renderCanvas() {
            ctx.fillStyle = "#3f7568";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Title Header
            ctx.fillStyle = "#e9b949";
            ctx.font = "bold 18px sans-serif";
            ctx.fillText("📰 Universe News", 15, 30);

            if (faceImg.complete) {
                ctx.drawImage(faceImg, 60, 45, 280, 340);
            }

            const lx = 200 + parseInt(lipX.value);
            const ly = 290 + parseInt(lipY.value);
            const scale = parseInt(lipScale.value) / 100;
            const w = 70 * scale;
            const h = 30 * scale;

            ctx.save();
            ctx.translate(lx, ly);

            if (lipOpenAmount > 0.1) {
                ctx.fillStyle = "#42130e";
                ctx.beginPath();
                ctx.ellipse(0, 0, w / 2, (h / 2) * lipOpenAmount, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#ffffff";
                ctx.fillRect(-w/3, -((h/2) * lipOpenAmount), (w*2)/3, 5);
            } else {
                ctx.strokeStyle = "#803328";
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(-w/2, 0);
                ctx.quadraticCurveTo(0, 5, w/2, 0);
                ctx.stroke();
            }
            ctx.restore();

            ctx.fillStyle = "#bf4d3c";
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

            ctx.fillStyle = "#e9b949";
            ctx.fillRect(0, canvas.height - 40, 110, 40);

            ctx.fillStyle = "#000000";
            ctx.font = "bold 12px sans-serif";
            ctx.fillText("BREAKING", 15, canvas.height - 15);

            // Breaking Ticker Text
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 14px sans-serif";
            ctx.fillText("Universe News पोर्टल में आपका स्वागत है... सत्य और ज्ञान की ताज़ा अपडेट्स...", tickerX, canvas.height - 15);

            tickerX -= 2;
            if (tickerX < -450) tickerX = canvas.width;

            requestAnimationFrame(renderCanvas);
        }
        renderCanvas();

        // Load Images & Audio
        faceInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => faceImg.src = ev.target.result;
                reader.readAsDataURL(file);
            }
        });

        audioInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buf = await file.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(buf);
                alert("ऑडियो लोड हो गया!");
            }
        });

        function processAudioSync() {
            if (!isPlaying || !analyserNode) return;
            const samples = new Uint8Array(analyserNode.fftSize);
            analyserNode.getByteTimeDomainData(samples);

            let sum = 0;
            for (let i = 0; i < samples.length; i++) {
                let norm = (samples[i] - 128) / 128;
                sum += norm * norm;
            }
            let rms = Math.sqrt(sum / samples.length);
            lipOpenAmount = Math.min(1, Math.max(0, (rms - 0.01) * 8));

            if (isPlaying) requestAnimationFrame(processAudioSync);
        }

        playBtn.addEventListener('click', () => {
            if (!audioBuffer) return alert("कृपया पहले ऑडियो अपलोड करें!");
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isPlaying) {
                sourceNode.stop();
                isPlaying = false;
                playBtn.textContent = "▶ Play Audio & Lip-Sync";
                lipOpenAmount = 0;
            } else {
                sourceNode = audioCtx.createBufferSource();
                analyserNode = audioCtx.createAnalyser();
                audioDest = audioCtx.createMediaStreamDestination();

                sourceNode.buffer = audioBuffer;
                analyserNode.fftSize = 256;

                sourceNode.connect(analyserNode);
                sourceNode.connect(audioCtx.destination);
                sourceNode.connect(audioDest);

                sourceNode.start(0);
                isPlaying = true;
                playBtn.textContent = "⏹ Stop Audio";
                processAudioSync();

                sourceNode.onended = () => {
                    isPlaying = false;
                    playBtn.textContent = "▶ Play Audio & Lip-Sync";
                    lipOpenAmount = 0;
                };
            }
        });

        // 🎬 RECORDING + FIREBASE AUTO-UPLOAD WITH 10 VIDEO LIMIT
        startStopRecBtn.addEventListener('click', () => {
            if (!isRecording) {
                const canvasStream = canvas.captureStream(30);
                let combinedTracks = [...canvasStream.getVideoTracks()];

                if (audioDest && audioDest.stream.getAudioTracks().length > 0) {
                    combinedTracks.push(audioDest.stream.getAudioTracks()[0]);
                }

                const finalStream = new MediaStream(combinedTracks);
                let options = { mimeType: 'video/webm' };
                if (MediaRecorder.isTypeSupported('video/mp4')) options = { mimeType: 'video/mp4' };

                mediaRecorder = new MediaRecorder(finalStream, options);
                recordedChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType });
                    statusBadge.textContent = "⏳ UPLOADING TO FIREBASE...";

                    // Local Download
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `UniverseNews_${Date.now()}.webm`;
                    a.click();

                    // Upload to Firebase Storage
                    const fileName = `videos/news_${Date.now()}.webm`;
                    const storageRef = storage.ref(fileName);
                    
                    try {
                        await storageRef.put(blob);
                        const downloadURL = await storageRef.getDownloadURL();

                        // Save Metadata to Firestore
                        await db.collection("news_videos").add({
                            url: downloadURL,
                            filePath: fileName,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        // Maintain Max 10 Videos Limit
                        await checkAndCleanLimit();

                        statusBadge.textContent = "✅ SAVED & UPLOADING COMPLETE!";
                    } catch (err) {
                        alert("Upload Error: " + err.message);
                        statusBadge.textContent = "❌ UPLOAD FAILED";
                    }

                    resetProgress();
                };

                mediaRecorder.start(100);
                isRecording = true;
                isPaused = false;

                startStopRecBtn.textContent = "⏹ Stop & Save";
                pauseResumeRecBtn.disabled = false;
                pauseResumeRecBtn.textContent = "⏸ Pause";
                statusBadge.textContent = "🔴 RECORDING IN PROGRESS...";

                recSeconds = 0;
                recTimerInterval = setInterval(() => {
                    if (!isPaused) {
                        recSeconds += 0.5;
                        let fillPct = Math.min(100, (recSeconds / 60) * 100);
                        progressFill.style.width = fillPct + "%";
                    }
                }, 500);

            } else {
                mediaRecorder.stop();
                isRecording = false;
                isPaused = false;

                startStopRecBtn.textContent = "🔴 Start Record";
                pauseResumeRecBtn.disabled = true;
                pauseResumeRecBtn.textContent = "⏸ Pause";
                clearInterval(recTimerInterval);
            }
        });

        pauseResumeRecBtn.addEventListener('click', () => {
            if (!isRecording) return;
            if (!isPaused) {
                mediaRecorder.pause();
                isPaused = true;
                pauseResumeRecBtn.textContent = "▶ Resume";
                statusBadge.textContent = "⏸ RECORDING PAUSED";
            } else {
                mediaRecorder.resume();
                isPaused = false;
                pauseResumeRecBtn.textContent = "⏸ Pause";
                statusBadge.textContent = "🔴 RECORDING RESUMED...";
            }
        });

        function resetProgress() {
            progressFill.style.width = "0%";
            clearInterval(recTimerInterval);
        }

        // 🗑️ AUTOMATIC DELETE OLDEST VIDEO IF > 10
        async function checkAndCleanLimit() {
            const snapshot = await db.collection("news_videos").orderBy("timestamp", "asc").get();
            if (snapshot.size > 10) {
                const deleteCount = snapshot.size - 10;
                for (let i = 0; i < deleteCount; i++) {
                    const docToDelete = snapshot.docs[i];
                    const data = docToDelete.data();

                    if (data.filePath) {
                        await storage.ref(data.filePath).delete().catch(() => {});
                    }
                    await db.collection("news_videos").doc(docToDelete.id).delete();
                }
            }
        }

        // 🔐 ADMIN PORTAL ACCESS WITH SECURITY (PASSWORD: tamir@lI00769)
        openAdminBtn.addEventListener('click', () => {
            const pass = prompt("🔐 Enter Admin Password:");
            if (pass === "tamir@lI00769") {
                adminModal.style.display = "flex";
                loadAdminVideos();
            } else if (pass !== null) {
                alert("❌ Wrong Password!");
            }
        });

        exitAdminBtn.addEventListener('click', () => {
            adminModal.style.display = "none";
        });

        // Load & Play Videos in Admin Panel
        async function loadAdminVideos() {
            videoListContainer.innerHTML = "<p>Loading Videos...</p>";
            const snapshot = await db.collection("news_videos").orderBy("timestamp", "desc").get();

            if (snapshot.empty) {
                videoListContainer.innerHTML = "<p>No videos found in database.</p>";
                return;
            }

            videoListContainer.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "video-card";
                card.innerHTML = `
                    <video src="${data.url}" controls></video>
                    <div class="card-actions">
                        <small>📅 ${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Just now'}</small>
                        <button class="btn btn-red" style="padding:4px 8px; font-size:0.75rem;" onclick="deleteVideo('${doc.id}', '${data.filePath}')">🗑️ Delete</button>
                    </div>
                `;
                videoListContainer.appendChild(card);
            });
        }

        // Admin Manual Delete Function
        window.deleteVideo = async function(docId, filePath) {
            if (confirm("Are you sure you want to delete this video?")) {
                if (filePath) {
                    await storage.ref(filePath).delete().catch(() => {});
                }
                await db.collection("news_videos").doc(docId).delete();
                alert("Video deleted!");
                loadAdminVideos();
            }
        };
    </script>
</body>
</html>
